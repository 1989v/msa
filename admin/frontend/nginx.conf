server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA entry — 새 빌드 배포 시 즉시 반영되도록 캐시 비활성화.
    # Vite 의 hash 파일명은 /assets/ 아래 별도 location 에서 immutable 캐시.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ADR-0031 §5.3: in-cluster Pod → gateway 호출은 NetworkPolicy 로 차단된다.
    # /api/* 는 ingress 가 직접 gateway 로 라우팅하므로 (k8s/.../gateway ingress
    # path: /api(/.*)? ) FE nginx 의 proxy_pass 설정은 불필요.
    # axios baseURL='' 이면 browser 가 같은 origin 의 /api/* 절대 경로로 호출해
    # admin path prefix 와 무관하게 ingress 가 gateway 로 보낸다.

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
