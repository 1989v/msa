spring:
  application:
    name: discovery-service-test

server:
  port: 0  # 랜덤 포트

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false
