spring:
  datasource:
    master:
      jdbc-url: jdbc:mysql://mysql-product-master:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    replica:
      jdbc-url: jdbc:mysql://mysql-product-replica:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  kafka:
    bootstrap-servers: kafka:29092
  data:
    redis:
      cluster:
        nodes:
          - redis-1:6379
          - redis-2:6380
          - redis-3:6381
          - redis-4:6382
          - redis-5:6383
          - redis-6:6384

# ADR-0029 PR-9 — processed_event 7일 retention cleanup 스케줄러 활성화.
# common 의 IdempotentEventCleanupScheduler 가 매일 cron 시각에 retention 보다 오래된 row 를 삭제.
kgd:
  common:
    messaging:
      idempotent:
        cleanup:
          enabled: true
          retention: P7D
          cron: "0 45 3 * * *"
          zone: Asia/Seoul
