spring:
  application:
    name: product-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3316/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:product_user}
      password: ${MYSQL_PASSWORD:product_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      jdbc-url: jdbc:mysql://localhost:3317/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:product_user}
      password: ${MYSQL_PASSWORD:product_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  # ADR-0029 PR-7: Flyway baseline 도입. Hibernate ddl-auto=validate 와 결합해 스키마 변경은 Flyway 단독 책임.
  # baseline-on-migrate=true + baseline-version=1 로 기존 운영 DB(이미 ddl-auto 가 만든 products 테이블 보유) 보호.
  # 신규 마이그레이션:
  #   - V1__create_products_table.sql                    (legacy baseline, IF NOT EXISTS 로 신규 DB 호환)
  #   - V20260502_010__create_processed_event.sql        (ADR-0029 PR-7, §6 표준 스키마 — product 측 신규 도입)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      cluster:
        nodes:
          - ${REDIS_NODE1:localhost:6379}
          - ${REDIS_NODE2:localhost:6380}
          - ${REDIS_NODE3:localhost:6381}
          - ${REDIS_NODE4:localhost:6382}
          - ${REDIS_NODE5:localhost:6383}
          - ${REDIS_NODE6:localhost:6384}
        password: ${REDIS_PASSWORD:}

server:
  port: 8081
  shutdown: graceful

kafka:
  topics:
    product-created: product.item.created
    product-updated: product.item.updated

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
