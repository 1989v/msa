spring:
  application:
    name: search-batch
  lifecycle:
    timeout-per-shutdown-phase: 30s
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  datasource:
    url: jdbc:h2:mem:batch-db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}

search:
  index:
    alias: products
  batch:
    page-size: 100

server:
  port: 8092
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,batch
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# 색인 소스 선택: api(기본) | db
# api: Product REST API를 통해 소싱 (서비스 경계 준수, 운영 중 사용)
# db: mysql-product-replica 직접 리드 (ADR-0009 예외, 초기 색인/DR 복구)
reindex:
  source: ${REINDEX_SOURCE:api}
