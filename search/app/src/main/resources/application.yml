spring:
  application:
    name: search-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
server:
  port: 8083
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

opensearch:
  uris: ${OPENSEARCH_URIS:http://localhost:9200}

search:
  ranking:
    popularity-weight: 10.0
    ctr-weight: 5.0
    # ADR-0050 Phase 1/2 — 모두 default 0 (점진 활성화)
    cvr-weight: 0.0
    gmv7d-weight: 0.0
    gmv30d-weight: 0.0
    freshness:
      weight: 0.0          # 0 이면 gauss decay 함수 미적용
      origin: now
      scale: 14d
      offset: 0d
      decay: 0.5
  # ADR-0050 Phase 4 — variant 별 RankingProperties (A/B 비교용)
  # 예시 (활성화 시):
  # ranking-variants:
  #   variants:
  #     experiment_a:
  #       popularity-weight: 10.0
  #       ctr-weight: 8.0
  #       cvr-weight: 3.0
  #       freshness: { weight: 1.0, scale: 14d, decay: 0.5 }
  #     experiment_b:
  #       popularity-weight: 5.0
  #       ctr-weight: 10.0
  #       gmv7d-weight: 2.0
  ranking-variants:
    variants: {}
  # 온라인 A/B — experiment 서비스 bucket assignment 로 variant 할당.
  # 활성화: experiment 서비스에 실험 등록 후 enabled=true + id 지정.
  # variant 키는 ranking-variants.variants 키와 일치해야 하며, 미정의 키(control)는 기본 ranking.
  experiment:
    enabled: false
    id: 0
    url: http://experiment:8091
  # ADR-0043 — Bandit / Thompson Sampling rerank
  bandit:
    enabled: true
    top-n: 100
    prior-alpha: 1.0
    prior-beta: 9.0
    decay-lambda-per-day: 0.02
    hybrid-weight: 0.8
    impression-threshold: 50
    session-cache-seconds: 60
    # category-priors:
    #   "fashion-women": "5.0,45.0"
    # ADR-0050 Phase 3 — 다중 scope blend. 비어 있으면 category 단일 scope (legacy 동일).
    # 예시 (활성화 시): brand 신호 추가 + category 와 7:3 가중치
    # scopes:
    #   - name: category
    #     weight: 0.7
    #     prior-alpha: 1.0
    #     prior-beta: 9.0
    #   - name: brand
    #     weight: 0.3
    #     prior-alpha: 1.0
    #     prior-beta: 9.0
  # ADR-0050 Phase 3 — Seller diversity rerank (default off)
  diversity:
    enabled: false
    max-per-seller: 3
    top-k: 20
    seller-key: category
