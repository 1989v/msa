name: ci

# PR/main 머지 전 사전 검증.
#
# 세 job (병렬):
#   - compile-gate       : Kotlin/Java 컴파일 검증 (test 는 미포함)
#   - yaml-validate      : application*.yml syntax + duplicate key 검증
#   - kustomize-validate : k8s overlay 렌더 검증
#
# yaml-validate 가 catch 한 케이스: Spring Boot startup 시점에야 발견되던
# duplicate top-level key (예: spring: 블록 두 번). compile-gate 는 yml 을
# 안 읽어서 못 잡음.
#
# 무거운 test/jib 는 images.yml 이 main push 시 수행. 솔로 환경 + public runner
# 무료라 PR 단계엔 빠른 게이트만.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-gate:
    name: Kotlin/Java compile (compile only, no test)
    runs-on: ubuntu-24.04-arm   # public repo + arm64 무료
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            msa
            msa-auth
            msa-gifticon

      - name: Checkout (root only)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: false
          fetch-depth: 1

      - name: Init build-required submodules (auth, gifticon)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          git submodule update --init --recursive -- auth gifticon

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ./gradlew compileKotlin compileJava
        run: ./gradlew compileKotlin compileJava --no-daemon

  yaml-validate:
    name: application*.yml syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            msa
            msa-auth
            msa-gifticon

      - name: Checkout (root + auth/gifticon submodules)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: false
          fetch-depth: 1

      - name: Init build-required submodules (auth, gifticon)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          git submodule update --init --recursive -- auth gifticon

      - name: Validate every application*.yml
        run: |
          set -e
          fail=0
          # Psych 의 YAML.load 는 duplicate key 를 조용히 덮어쓸 수 있으므로
          # AST 를 직접 순회해 동일 mapping 안의 중복 key 를 명시적으로 차단한다.
          while IFS= read -r f; do
            if ! ruby - "$f" 2>err.tmp <<'RUBY'
          require "psych"

          path = ARGV.fetch(0)
          tree = Psych.parse_stream(File.read(path), filename: path)
          errors = []

          def key_name(node)
            case node
            when Psych::Nodes::Scalar
              node.value
            else
              node.to_yaml
            end
          end

          def walk_yaml(node, path, errors)
            case node
            when Psych::Nodes::Mapping
              seen = {}
              node.children.each_slice(2) do |key_node, value_node|
                key = key_name(key_node)
                line = key_node.start_line + 1
                full_path = (path + [key]).join(".")

                if seen.key?(key)
                  errors << "duplicate key '#{full_path}' at line #{line} (first seen at line #{seen[key]})"
                else
                  seen[key] = line
                end

                walk_yaml(value_node, path + [key], errors)
              end
            when Psych::Nodes::Sequence
              node.children.each_with_index do |child, index|
                walk_yaml(child, path + ["[#{index}]"], errors)
              end
            end
          end

          tree.children.each do |document|
            walk_yaml(document.root, [], errors) if document.root
          end

          abort(errors.join("\n")) unless errors.empty?
          RUBY
            then
              echo "::error file=$f::$(cat err.tmp | head -1)"
              fail=1
            fi
            rm -f err.tmp
          done < <(find . \
                     -path ./.git -prune -o \
                     -path '*/build' -prune -o \
                     -path '*/node_modules' -prune -o \
                     -name "application*.yml" -print)
          exit $fail

  kustomize-validate:
    name: Kustomize render check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Render every kustomization
        run: |
          set -euo pipefail
          fail=0
          for dir in \
              k8s/base \
              k8s/infra/local \
              k8s/infra/local/mysql \
              k8s/infra/local/redis \
              k8s/infra/local/kafka \
              k8s/infra/local/elasticsearch \
              k8s/infra/local/clickhouse \
              k8s/infra/prod/backup \
              k8s/infra/prod/monitoring/dashboards \
              k8s/overlays/k3s-lite \
              k8s/overlays/oci-arm \
              k8s/overlays/prod-k8s; do
            echo "::group::kustomize $dir"
            if ! kubectl kustomize "$dir" > /tmp/render.yaml; then
              echo "::error::kustomize render failed for $dir"
              fail=1
            else
              wc -l /tmp/render.yaml
            fi
            echo "::endgroup::"
          done
          exit $fail
