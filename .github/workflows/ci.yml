name: ci

# 슬림 CI — manifest 깨짐만 사전 차단.
#
# 옛 jobs (build / jib-build / doc-index-check) 는 제거:
#   - build / jib-build : images.yml 이 동일한 빌드를 더 강하게 수행 (push 까지).
#                          중복이고 솔로 환경에선 로컬 `./gradlew build` 로 대체.
#   - doc-index-check   : 문서 정합성은 배포 흐름과 독립. 필요 시 별도 워크플로 분리.
#
# 남긴 것: kustomize-validate (가벼움, k8s overlay 안전망).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kustomize-validate:
    name: Kustomize render check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Render every kustomization
        run: |
          set -euo pipefail
          fail=0
          for dir in \
              k8s/base \
              k8s/infra/local \
              k8s/infra/local/mysql \
              k8s/infra/local/redis \
              k8s/infra/local/kafka \
              k8s/infra/local/elasticsearch \
              k8s/infra/local/clickhouse \
              k8s/infra/prod/backup \
              k8s/infra/prod/monitoring/dashboards \
              k8s/overlays/k3s-lite \
              k8s/overlays/oci-arm \
              k8s/overlays/prod-k8s; do
            echo "::group::kustomize $dir"
            if ! kubectl kustomize "$dir" > /tmp/render.yaml; then
              echo "::error::kustomize render failed for $dir"
              fail=1
            else
              wc -l /tmp/render.yaml
            fi
            echo "::endgroup::"
          done
          exit $fail
