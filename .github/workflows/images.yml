name: images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      registry:
        description: "Override registry (defaults to ghcr.io/<owner>)"
        required: false
        default: ""

# Only one image-publish run at a time per ref.
concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write    # required for ghcr.io push via GITHUB_TOKEN

jobs:
  publish:
    name: Build & push 18 JVM images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve registry + tag
        id: meta
        run: |
          set -euo pipefail
          REGISTRY="${{ github.event.inputs.registry }}"
          if [[ -z "$REGISTRY" ]]; then
            # ghcr.io/<owner>, lowercased per Docker registry rules.
            owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            REGISTRY="ghcr.io/$owner_lc"
          fi
          TAG="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "registry=$REGISTRY"  | tee -a "$GITHUB_OUTPUT"
          echo "tag=$TAG"            | tee -a "$GITHUB_OUTPUT"

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ./gradlew jib (push to registry)
        run: |
          ./gradlew jib --no-daemon \
              -PjibRegistry=${{ steps.meta.outputs.registry }} \
              -PjibTag=${{ steps.meta.outputs.tag }}

      - name: Summary
        run: |
          echo "Pushed images with registry **${{ steps.meta.outputs.registry }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: **latest**, **${{ steps.meta.outputs.tag }}**"             >> "$GITHUB_STEP_SUMMARY"
          echo "Run \`./gradlew jib -PjibRegistry=${{ steps.meta.outputs.registry }}\` locally to reproduce." >> "$GITHUB_STEP_SUMMARY"
