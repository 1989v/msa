name: images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      registry:
        description: "Override registry (default: <region>.ocir.io/<namespace>)"
        required: false
        default: ""

# Only one image-publish run at a time per ref.
concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write      # manifest commit-back

jobs:
  publish:
    name: Build & push arm64 images to OCIR + update oci-arm manifest
    runs-on: ubuntu-latest
    # `[skip ci]` prevent self-trigger on commit-back
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout (root only)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: false
          fetch-depth: 0

      - name: Init build-required submodules (auth, gifticon)
        run: |
          set -euo pipefail
          # 빌드에 필요한 서브모듈만 init — career/ai/private/ideabank 는
          # CI 빌드와 무관하므로 fetch 안함 (없거나 권한 없어도 실패하지 않음)
          git submodule update --init --recursive -- auth gifticon

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Docker Buildx (arm64 via QEMU)
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Resolve registry + tag
        id: meta
        env:
          OCIR_REGION: ${{ secrets.OCIR_REGION }}
          OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
        run: |
          set -euo pipefail
          REGISTRY="${{ github.event.inputs.registry }}"
          if [[ -z "$REGISTRY" ]]; then
            if [[ -z "${OCIR_REGION}" || -z "${OCIR_NAMESPACE}" ]]; then
              echo "::error::OCIR_REGION / OCIR_NAMESPACE secrets must be set"
              exit 1
            fi
            REGISTRY="${OCIR_REGION}.ocir.io/${OCIR_NAMESPACE}"
          fi
          TAG="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "registry=$REGISTRY"  | tee -a "$GITHUB_OUTPUT"
          echo "tag=$TAG"            | tee -a "$GITHUB_OUTPUT"

      - name: Authenticate to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGION }}.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      # ───── JVM 이미지: 20개 service Jib 빌드 (arm64 only) ─────
      - name: ./gradlew jib (push arm64 JVM images)
        run: |
          ./gradlew jib --no-daemon \
              -PjibRegistry=${{ steps.meta.outputs.registry }} \
              -PjibTag=${{ steps.meta.outputs.tag }}

      # ───── FE/Python 이미지: docker buildx arm64 ──────────────────────────
      - name: Build & push Docker-based images (FE + Python)
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # name|context|dockerfile
          IMAGES=(
            "admin-fe|admin/frontend|Dockerfile"
            "gifticon-fe|gifticon/frontend|Dockerfile"
            "agent-viewer-fe|agent-viewer/front|Dockerfile"
            "portal-fe|portal-fe|Dockerfile"
            "quant-fe|quant/frontend|Dockerfile"
            "quant-ingest|quant/ingest|Dockerfile"
            "recommendation-ml|recommendation-ml|Dockerfile"
            "recommendation-ann|recommendation-ann|Dockerfile"
          )
          for entry in "${IMAGES[@]}"; do
            IFS='|' read -r name ctx df <<< "$entry"
            if [[ ! -f "$ctx/$df" ]]; then
              echo "::warning::Skip $name — $ctx/$df not found"
              continue
            fi
            echo "── docker buildx build → $REGISTRY/$name:{latest,$TAG}"
            docker buildx build \
              --platform linux/arm64 \
              -f "$ctx/$df" \
              -t "$REGISTRY/$name:latest" \
              -t "$REGISTRY/$name:$TAG" \
              --push \
              "$ctx"
          done

      # ───── kustomization.yaml 의 images: 섹션 갱신 ────────────────────────
      - name: Update oci-arm manifest image tags
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # yq v4 설치 (mikefarah/yq)
          if ! command -v yq &>/dev/null; then
            curl -sSL -o /tmp/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /tmp/yq
            sudo mv /tmp/yq /usr/local/bin/yq
          fi

          # 28개 서비스 (JVM 20 + Docker 8) — image 이름 명세
          ALL_IMAGES=(
            gateway product order search search-batch search-consumer
            auth member wishlist gifticon analytics experiment
            code-dictionary inventory fulfillment warehouse chatbot
            quant recommendation agent-viewer-api
            admin-fe gifticon-fe agent-viewer-fe portal-fe quant-fe
            quant-ingest recommendation-ml recommendation-ann
          )

          KUSTOM=k8s/overlays/oci-arm/kustomization.yaml

          # images: 키 없으면 빈 배열로 초기화
          yq -i '.images = (.images // [])' "$KUSTOM"

          for svc in "${ALL_IMAGES[@]}"; do
            # 기존 항목 제거 후 새 항목 추가 (upsert)
            yq -i "(.images) |= map(select(.name != \"commerce/$svc\"))" "$KUSTOM"
            yq -i "(.images) += [{\"name\": \"commerce/$svc\", \"newName\": \"$REGISTRY/$svc\", \"newTag\": \"$TAG\"}]" "$KUSTOM"
          done

          # 정렬 + 검증
          yq -i '(.images) |= sort_by(.name)' "$KUSTOM"
          yq '.images' "$KUSTOM" | head -30

      - name: Commit manifest update
        run: |
          set -euo pipefail
          if git diff --quiet k8s/overlays/oci-arm/kustomization.yaml; then
            echo "No manifest changes — skip commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/oci-arm/kustomization.yaml
          git commit -m "ci: bump oci-arm image tags to ${{ steps.meta.outputs.tag }} [skip ci]"
          git push

      - name: Summary
        run: |
          {
            echo "## Image publish (OCIR / arm64)"
            echo "Registry: \`${{ steps.meta.outputs.registry }}\`"
            echo "Tag     : \`${{ steps.meta.outputs.tag }}\` + \`latest\`"
            echo "Architecture: linux/arm64"
            echo
            echo "Argo CD 가 main 의 manifest 변경을 감지하면 자동 sync 됩니다."
          } >> "$GITHUB_STEP_SUMMARY"
