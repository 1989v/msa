services:
  charting-db:
    image: pgvector/pgvector:pg16
    container_name: charting-db
    environment:
      POSTGRES_DB: charting
      POSTGRES_USER: charting
      POSTGRES_PASSWORD: charting
    ports:
      - "5433:5432"
    volumes:
      - charting-db-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charting -d charting"]
      interval: 10s
      timeout: 5s
      retries: 5

  charting-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: charting-api
    environment:
      DATABASE_URL: postgresql+psycopg://charting:charting@charting-db:5432/charting
      APP_ENV: production
    ports:
      - "8010:8010"
    depends_on:
      charting-db:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro

  charting-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: charting-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8010
    ports:
      - "3010:80"
    depends_on:
      - charting-api

volumes:
  charting-db-data:
