spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      cluster:
        nodes:
          - ${REDIS_NODE1:localhost:6379}
          - ${REDIS_NODE2:localhost:6380}
          - ${REDIS_NODE3:localhost:6381}
          - ${REDIS_NODE4:localhost:6382}
          - ${REDIS_NODE5:localhost:6383}
          - ${REDIS_NODE6:localhost:6384}
        password: ${REDIS_PASSWORD:}
        max-redirects: 3
  cloud:
    gateway:
      routes:
        - id: analytics-service
          uri: http://analytics:8090
          predicates:
            - Path=/api/v1/scores/**, /api/v1/analytics/**
        - id: experiment-service
          uri: http://experiment:8091
          predicates:
            - Path=/api/v1/experiments/**

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-32-chars-long!}
  access-expiry: 1800
  refresh-expiry: 604800

kgd:
  common:
    security:
      enabled: true
      aes-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
