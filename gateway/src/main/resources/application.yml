spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      # Long-lived SSE 라우팅 시 Reactor Netty 의 기본 응답 타임아웃이 끊지 않도록
      # SSE 전용 라우트(quant-paper-sse)는 메타데이터로 response-timeout=0 (disable) 명시.
      # 글로벌 httpClient.responseTimeout 은 변경하지 않는다 (단방향 short-lived 라우트 영향 회피).
      # Spring Cloud 2025.1 (Oakwood): routes 경로가 server.webflux.routes 로 이동.
      server:
        webflux:
          routes:
            - id: analytics-service
              uri: http://analytics:8090
              predicates:
                - Path=/api/v1/scores/**, /api/v1/analytics/**
            - id: experiment-service
              uri: http://experiment:8091
              predicates:
                - Path=/api/v1/experiments/**
            # T4.1 — Code Dictionary 서비스 (IT 개념 사전 + OpenSearch 검색/시각화 + 서비스 카탈로그)
            # /api/v1/search 와 /api/v1/services 도 동일 백엔드 (portal-fe 의 axios 호출 호환).
            - id: code-dictionary-service
              uri: http://code-dictionary:8089
              predicates:
                - Path=/api/v1/concepts/**, /api/v1/index/**, /api/v1/search/**, /api/v1/services/**
            # TG-P2-13 — Quant SSE (long-lived). 반드시 REST 라우트보다 위에 두어
            # 더 구체적인 경로 패턴이 먼저 매칭되게 한다.
            - id: quant-paper-sse
              uri: http://quant:8094
              predicates:
                - Path=/api/v1/strategies/*/paper/sse
              metadata:
                response-timeout: 0
                connect-timeout: 5000
            # TG-P2-13 — Quant REST (short-lived).
            - id: quant-service
              uri: http://quant:8094
              predicates:
                - Path=/api/v1/strategies/**, /api/v1/dashboard/**, /api/v1/leaderboard/**, /api/v1/runs/**, /api/v1/signal-strategies/**, /api/v1/charts/**, /api/v1/learn/**, /api/v1/quant/**

            # === Backend REST 라우트 (admin / 일반 클라이언트용) ===
            # 백엔드 컨트롤러는 /api/products, /api/orders, /api/auth, /api/members 사용 (no v1).
            - id: product-service
              uri: http://product:8081
              predicates: [Path=/api/products/**]
            - id: order-service
              uri: http://order:8082
              predicates: [Path=/api/orders/**]
            - id: auth-service
              uri: http://auth:8087
              predicates: [Path=/api/auth/**]
            - id: member-service
              uri: http://member:8093
              predicates: [Path=/api/members/**]

            # === Actuator 프록시 라우트 (admin 서비스 health 표시용) ===
            # 사용: /svc/<service>/actuator/health → http://<service>:<port>/actuator/health
            # 패턴: StripPrefix=2 가 /svc/<service> 두 segment 를 제거.
            # gateway 자체 actuator 는 /actuator/health (routes 무관, Spring Boot 가 직접 노출).
            - id: actuator-product
              uri: http://product:8081
              predicates: [Path=/svc/product/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-order
              uri: http://order:8082
              predicates: [Path=/svc/order/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-search
              uri: http://search:8083
              predicates: [Path=/svc/search/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-auth
              uri: http://auth:8087
              predicates: [Path=/svc/auth/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-code-dictionary
              uri: http://code-dictionary:8089
              predicates: [Path=/svc/code-dictionary/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-member
              uri: http://member:8093
              predicates: [Path=/svc/member/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-gifticon
              uri: http://gifticon:8086
              predicates: [Path=/svc/gifticon/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-wishlist
              uri: http://wishlist:8095
              predicates: [Path=/svc/wishlist/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-quant
              uri: http://quant:8094
              predicates: [Path=/svc/quant/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-analytics
              uri: http://analytics:8090
              predicates: [Path=/svc/analytics/actuator/**]
              filters: [StripPrefix=2]
            - id: actuator-experiment
              uri: http://experiment:8091
              predicates: [Path=/svc/experiment/actuator/**]
              filters: [StripPrefix=2]

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-32-chars-long!}
  access-expiry: 1800
  refresh-expiry: 604800

kgd:
  common:
    security:
      enabled: true
      aes-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
