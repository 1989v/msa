spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      cluster:
        nodes:
          - ${REDIS_NODE1:localhost:6379}
          - ${REDIS_NODE2:localhost:6380}
          - ${REDIS_NODE3:localhost:6381}
          - ${REDIS_NODE4:localhost:6382}
          - ${REDIS_NODE5:localhost:6383}
          - ${REDIS_NODE6:localhost:6384}
        password: ${REDIS_PASSWORD:}
        max-redirects: 3
  cloud:
    gateway:
      # Long-lived SSE 라우팅 시 Reactor Netty 의 기본 응답 타임아웃이 끊지 않도록
      # SSE 전용 라우트(quant-paper-sse)는 메타데이터로 response-timeout=0 (disable) 명시.
      # 글로벌 httpClient.responseTimeout 은 변경하지 않는다 (단방향 short-lived 라우트 영향 회피).
      # Spring Cloud 2025.1 (Oakwood): routes 경로가 server.webflux.routes 로 이동.
      server:
        webflux:
          routes:
            - id: analytics-service
              uri: http://analytics:8090
              predicates:
                - Path=/api/v1/scores/**, /api/v1/analytics/**
            - id: experiment-service
              uri: http://experiment:8091
              predicates:
                - Path=/api/v1/experiments/**
            # T4.1 — Code Dictionary 서비스 (IT 개념 사전 + OpenSearch 검색/시각화 + 서비스 카탈로그)
            # /api/v1/search 와 /api/v1/services 도 동일 백엔드 (portal-fe 의 axios 호출 호환).
            - id: code-dictionary-service
              uri: http://code-dictionary:8089
              predicates:
                - Path=/api/v1/concepts/**, /api/v1/index/**, /api/v1/search/**, /api/v1/services/**
            # TG-P2-13 — Quant SSE (long-lived). 반드시 REST 라우트보다 위에 두어
            # 더 구체적인 경로 패턴이 먼저 매칭되게 한다.
            - id: quant-paper-sse
              uri: http://quant:8094
              predicates:
                - Path=/api/v1/strategies/*/paper/sse
              metadata:
                response-timeout: 0
                connect-timeout: 5000
            # TG-P2-13 — Quant REST (short-lived).
            - id: quant-service
              uri: http://quant:8094
              predicates:
                - Path=/api/v1/strategies/**, /api/v1/dashboard/**, /api/v1/leaderboard/**, /api/v1/runs/**, /api/v1/signal-strategies/**, /api/v1/charts/**, /api/v1/learn/**

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-32-chars-long!}
  access-expiry: 1800
  refresh-expiry: 604800

kgd:
  common:
    security:
      enabled: true
      aes-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
