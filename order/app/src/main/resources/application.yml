spring:
  application:
    name: order-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3326/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:order_user}
      password: ${MYSQL_PASSWORD:order_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      jdbc-url: jdbc:mysql://localhost:3327/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:order_user}
      password: ${MYSQL_PASSWORD:order_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  # ADR-0032 PR-2 / ADR-0029 PR-3b — Flyway 가 schema 단독 책임.
  # baseline-on-migrate=true + baseline-version=0 으로 기존 운영 DB(이미 ddl-auto 가 만든 orders 테이블 보유) 보호.
  # 신규 마이그레이션:
  #   - V20260502_001__create_outbox_event.sql        (ADR-0032 PR-2)
  #   - V20260502_002__create_processed_event.sql     (ADR-0029 PR-3b, §6 표준 스키마)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8082
  shutdown: graceful

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:9090}

product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}

kafka:
  topics:
    order-completed: order.order.completed
    order-cancelled: order.order.cancelled

# ADR-0032 PR-2 — Order Outbox (common module).
# Phase 2 CDC (Debezium) 도입 시 enabled=false 로 토글하여 polling 비활성화.
outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}
    interval-ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
