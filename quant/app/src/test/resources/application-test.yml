spring:
  datasource:
    url: jdbc:h2:mem:quant;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  # TG-08: 단위/슬라이스 테스트 프로파일에서는 Flyway 를 끈다 (H2 + ddl-auto=create-drop 사용).
  # MySQL 통합 테스트는 PersistenceIntegrationSpec 이 Testcontainers 로 별도 DataSource 를 주입.
  flyway:
    enabled: false

kgd:
  common:
    redis:
      enabled: false
    analytics:
      enabled: false

# TG-P2-03: 테스트 프로파일 — LocalFile KMS 어댑터 활성화용 dummy KEK.
# 평문 hex 32-byte (00 ~ 1F 반복) — 단위 테스트 안정화 목적, 운영 절대 사용 금지.
quant:
  security:
    kms:
      provider: local
      local:
        current-version: v1
        kek-versions:
          v1: 000102030405060708090a0b0c0d0e0f000102030405060708090a0b0c0d0e0f
  # TG-P2-10: 테스트에서 NotificationDispatcher 백그라운드 worker 가 자동 기동되지 않도록 disable.
  # Sender / Queue / RateLimiter 단위 테스트는 직접 인스턴스화하여 검증한다.
  notification:
    dispatcher:
      enabled: false
