server:
  port: 8094
  shutdown: graceful

spring:
  application:
    name: quant-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  threads:
    virtual:
      enabled: true  # ADR-0024 §3 가상 스레드 활성화
  datasource:
    url: jdbc:mysql://localhost:3306/quant?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:quant}
    password: ${DB_PASSWORD:quant}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # TG-08: Flyway 마이그레이션. Hibernate ddl-auto=validate 와 결합해 스키마 변경은 Flyway 가 단독 책임.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

kgd:
  common:
    redis:
      enabled: false  # Phase 1 불필요
    analytics:
      enabled: false

# TG-06.5: quant 전용 ClickHouse 설정. analytics DB 와 분리 (ADR-0024 §12).
quant:
  clickhouse:
    url: ${SEVEN_SPLIT_CH_URL:jdbc:clickhouse://localhost:8123/quant}
    username: ${SEVEN_SPLIT_CH_USERNAME:quant}
    password: ${SEVEN_SPLIT_CH_PASSWORD:quant}
    database: quant
  # TG-P2-03 (ADR-0027): KEK 보관 어댑터 분기.
  # provider 값에 따라 OCI Vault / LocalFile / Fake 중 1개만 활성화된다.
  # - oci   : 운영 (K8s Secret 으로 OCI_* 자격증명 주입 필수)
  # - local : 로컬 dev / k3s-lite (application-local.yml 에서 KEK hex 주입)
  # - fake  : (예약) 테스트 환경. 실제 빈 등록은 테스트 source set 에서 수동 구성.
  security:
    kms:
      provider: ${SEVEN_SPLIT_KMS_PROVIDER:local}
      local:
        current-version: ${SEVEN_SPLIT_LOCAL_KEK_CURRENT_VERSION:v1}
        kek-versions:
          v1: ${SEVEN_SPLIT_LOCAL_KEK_V1:}
      oci:
        tenancy-ocid: ${OCI_TENANCY:}
        user-ocid: ${OCI_USER:}
        fingerprint: ${OCI_FINGERPRINT:}
        private-key-path: ${OCI_PRIVATE_KEY_PATH:}
        region: ${OCI_REGION:}
        vault-key-ocid: ${OCI_VAULT_KEY_OCID:}
        crypto-endpoint: ${OCI_VAULT_CRYPTO_ENDPOINT:}
  # TG-P2-06 / TG-P2-07: 시세 hot path. 기본 비활성, 운영 활성화 시 K8s overlay 에서 enabled=true.
  market:
    bithumb-ws:
      enabled: ${SEVEN_SPLIT_BITHUMB_WS_ENABLED:false}
      url: ${SEVEN_SPLIT_BITHUMB_WS_URL:wss://pubwss.bithumb.com/pub/ws}
      symbols: ${SEVEN_SPLIT_BITHUMB_WS_SYMBOLS:BTC_KRW,ETH_KRW}
      monitor-interval-ms: 1000
      system-tenant: system
    bithumb-rest:
      base-url: ${SEVEN_SPLIT_BITHUMB_REST_URL:https://api.bithumb.com}
    kafka-fanout:
      enabled: ${SEVEN_SPLIT_MARKET_KAFKA_FANOUT_ENABLED:false}
      topic: quant.market.tick.bithumb.v1
  # TG-P2-08: PAPER 모드 가상 거래소 파라미터. 'paper' 또는 'test' 프로파일에서만 PaperExchangeAdapter 활성화.
  paper:
    slippage:
      rate: ${SEVEN_SPLIT_PAPER_SLIPPAGE_RATE:0.0005}      # 0.05% 고정 슬리피지
    execution-latency:
      ms:
        default: ${SEVEN_SPLIT_PAPER_LATENCY_MS:50}        # 평균 거래소 지연
        jitter: ${SEVEN_SPLIT_PAPER_LATENCY_JITTER_MS:20}  # ± jitter
    partial-fill:
      probability: ${SEVEN_SPLIT_PAPER_PARTIAL_FILL_PROB:0.0}  # Phase 2 reserved (현재 사용 안 함)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
