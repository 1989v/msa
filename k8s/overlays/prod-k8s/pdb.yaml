# PodDisruptionBudget per app service. minAvailable: 1 ensures at
# least one replica stays up during voluntary disruptions (node
# drains, cluster upgrades). Combined with HPA's minReplicas: 2 this
# gives a rolling headroom of one pod.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
---
