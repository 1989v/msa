# HorizontalPodAutoscaler per app service. CPU target 70% is a decent
# default for Spring Boot workloads — adjust per service load pattern
# once you have production metrics from kube-prometheus-stack (Phase 4).
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: gateway }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
