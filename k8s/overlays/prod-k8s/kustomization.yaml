apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for managed Kubernetes (EKS / GKE / AKS).
#
# This overlay intentionally does NOT pull in k8s/infra/local/ because
# production uses Operator-managed infrastructure (Strimzi Kafka,
# Percona MySQL, ECK Elasticsearch, Altinity ClickHouse, real Redis
# cluster, kube-prometheus-stack) that lives under k8s/infra/prod/ and
# lands in Phase 4.
#
# Apply with:
#   kubectl apply -k k8s/overlays/prod-k8s
#
# Prerequisites (installed separately):
#   - ingress-nginx
#   - cert-manager + ClusterIssuer named "letsencrypt-prod" (Phase 4)
#   - Phase 4 Operator infrastructure

namespace: commerce

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml

patches:
  # Replicas: every app service scales to 2 replicas as a minimum
  # guarantee for rolling updates and HPA headroom.
  - path: patches/replicas.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"

  # Resources: production sizing — double the base memory and add a
  # CPU limit so noisy neighbors don't starve the node.
  - path: patches/resources.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"

  # FE tier: nginx 정적 서빙은 JVM 사이징이 과해서 소형 티어로 재덮어쓰기
  # (resources.yaml 뒤에 와야 한다 — patch 적용 순서가 우선순위).
  - path: patches/resources-fe.yaml
    target:
      kind: Deployment
      name: ".*-fe"

  # 이미지 신뢰성: prod 는 항상 레지스트리에서 pull.
  - path: patches/image-pull-policy.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"

  # Ingress TLS: switch to HTTPS with cert-manager.
  - path: patches/ingress-tls.yaml
    target:
      kind: Ingress
      name: gateway
