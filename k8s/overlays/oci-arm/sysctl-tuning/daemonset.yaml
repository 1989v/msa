# sysctl-tuning — 노드 측 커널 파라미터를 매니페스트로 영구 적용.
#
# 동기: cloudflared 2026.5.0 의 MASQUE/QUIC 가 net.core.rmem_max / wmem_max
# 7 MiB 권장. OCI Ubuntu 기본값 (208 KiB ~ 416 KiB) 으론 부족 →
# `failed to sufficiently increase receive buffer size` 경고 + QUIC packet
# 손실 가능성. 결과적으로 MySQL handshake 같은 large initial packet drop.
#
# 정공법: HTTP/2 fallback (`--protocol=http2`) 대신 노드 측 sysctl 조정으로
# 표준 MASQUE 동작 보장. DaemonSet 으로 매니페스트 관리 → 노드 재부팅 시에도
# pod 재시작으로 자동 재적용. ssh manual 명령 대비 git source of truth.
#
# privileged + hostNetwork 필요 — sysctl 자체가 host kernel parameter 라
# 컨테이너 namespace 안에선 의미 없음. 적용 후 sleep infinity 로 pod 유지
# (재시작 시 다시 sysctl 적용 위함).
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysctl-tuning
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sysctl-tuning
    app.kubernetes.io/component: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sysctl-tuning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sysctl-tuning
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: tune
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -e
              # QUIC / MASQUE 권장 buffer (7 MiB)
              sysctl -w net.core.rmem_max=7500000
              sysctl -w net.core.wmem_max=7500000
              # default buffer 도 살짝 올려서 burst 흡수
              sysctl -w net.core.rmem_default=1048576
              sysctl -w net.core.wmem_default=1048576
              echo "sysctl applied. Sleeping..."
              # pod 살아있어야 재부팅 후 자동 재적용
              sleep infinity
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
