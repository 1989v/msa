# cloudflared 는 다음 두 방향의 트래픽을 허용해야 한다.
#  - egress: Cloudflare 엣지 (*.argotunnel.com, port 7844 QUIC/HTTPS)
#  - ingress(에서 commerce 인프라로 가는 트래픽): MySQL 3306, Postgres 5432,
#    Redis 6379, Kafka 19092 EXTERNAL, ES 9200, ClickHouse 8123/9000
#
# base/network-policy 의 default-deny-all + allow-app-to-{mysql,redis,...} 는
# commerce-platform 라벨이 붙은 pod 의 ingress 만 허용한다. cloudflared 도
# part-of: commerce-platform 라벨을 달고 있어 그 allow rule 에 자동 매치되지만,
# 명시적으로 한 번 더 풀어두면 사고 가능성 낮음.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-egress
  namespace: commerce
  labels:
    app.kubernetes.io/component: zero-trust-tunnel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  policyTypes:
    - Egress
  egress:
    # Cloudflare 엣지 (외부 인터넷)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # cluster CIDR 차단 (cluster-internal 은 별도 rule 로)
              - 10.42.0.0/16
              - 10.43.0.0/16
      ports:
        - { protocol: TCP, port: 7844 }
        - { protocol: UDP, port: 7844 }
        - { protocol: TCP, port: 443 }
    # cluster-internal: 인프라 서비스로 가는 트래픽
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mysql
                  - redis
                  - kafka
                  - elasticsearch
                  - clickhouse
                  - quant-postgres
      ports:
        - { protocol: TCP, port: 3306 }
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 6379 }
        - { protocol: TCP, port: 9200 }
        - { protocol: TCP, port: 8123 }
        - { protocol: TCP, port: 9000 }
        - { protocol: TCP, port: 19092 }
    # DNS (cluster CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
