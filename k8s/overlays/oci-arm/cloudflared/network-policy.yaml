# cloudflared 의 네트워크 정책 — 두 NetworkPolicy 로 분리:
#  1) allow-cloudflared-egress    : cloudflared → 외부(엣지) + 인프라 + DNS
#  2) allow-cloudflared-to-infra  : 인프라 측에서 cloudflared 의 ingress 허용
#
# 왜 (2) 가 별도로 필요한가:
#   - base/network-policy 의 `allow-app-to-clickhouse` 는 from 이 좁음
#     (analytics / quant / quant-ingest / recommendation / recommendation-ml).
#     cloudflared 매치 안 됨 → default-deny 가 차단.
#   - `quant-postgres` 는 명시 ingress 정책 자체가 없음 → default-deny.
#   - 그래서 cloudflared → infra 의 ingress 를 인프라 측 podSelector 기반으로
#     별도 허용.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-egress
  namespace: commerce
  labels:
    app.kubernetes.io/component: zero-trust-tunnel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  policyTypes:
    - Egress
  egress:
    # Cloudflare 엣지 (외부 인터넷)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # cluster CIDR 차단 (cluster-internal 은 별도 rule 로)
              - 10.42.0.0/16
              - 10.43.0.0/16
      ports:
        - { protocol: TCP, port: 7844 }
        - { protocol: UDP, port: 7844 }
        - { protocol: TCP, port: 443 }
    # cluster-internal: 인프라 서비스로 가는 트래픽
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mysql
                  - redis
                  - kafka
                  - elasticsearch
                  - clickhouse
                  - quant-postgres
      ports:
        - { protocol: TCP, port: 3306 }
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 6379 }
        - { protocol: TCP, port: 9200 }
        - { protocol: TCP, port: 8123 }
        - { protocol: TCP, port: 9000 }
        - { protocol: TCP, port: 19092 }
    # DNS (cluster CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# 인프라 측 ingress — cloudflared 가 인프라 6종에 접근하도록 허용.
# base/network-policy 의 좁은 allow rule 우회용 (분석: 위 헤더 코멘트).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-to-infra
  namespace: commerce
  labels:
    app.kubernetes.io/component: zero-trust-tunnel
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mysql
          - redis
          - kafka
          - elasticsearch
          - clickhouse
          - quant-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudflared
      ports:
        - { protocol: TCP, port: 3306 }   # mysql
        - { protocol: TCP, port: 5432 }   # postgres
        - { protocol: TCP, port: 6379 }   # redis
        - { protocol: TCP, port: 19092 }  # kafka EXTERNAL (외부 macOS docker client 용)
        - { protocol: TCP, port: 9200 }   # elasticsearch
        - { protocol: TCP, port: 8123 }   # clickhouse http
        - { protocol: TCP, port: 9000 }   # clickhouse native
