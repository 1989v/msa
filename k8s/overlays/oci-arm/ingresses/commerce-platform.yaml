# commerce 플랫폼 Ingress — proxied 6 host + rt bypass host.
#
# 구조 분리 이유:
# 1) commerce-proxied — 6 host (root + admin/quant/gft/agent/api), CF proxy 활성.
#    secretName: cf-origin-ca-tls (수동 생성, Cloudflare Origin CA 15년 cert).
#    cert-manager annotation 없음 → cert-manager 가 이 cert 를 관리하지 않음.
#    SSL/TLS mode = Full (strict) 일 때 CF ↔ origin 검증 통과.
#
# 2) commerce-rt — rt.<DOMAIN>, CF proxy 미사용 (DNS only).
#    secretName: rt-tls (cert-manager 가 letsencrypt-prod HTTP01 으로 발급).
#    WebSocket / SSE bypass — CF 100s timeout + SSE 버퍼링 회피.
#
# host 매핑:
#   <DOMAIN>            (root)  → portal-fe   [proxied]
#   admin.<DOMAIN>              → admin-fe    [proxied]
#   quant.<DOMAIN>              → quant-fe    [proxied]
#   gft.<DOMAIN>                → gifticon-fe [proxied]
#   agent.<DOMAIN>              → agent-viewer-fe [proxied]
#   api.<DOMAIN>                → gateway (REST 위주) [proxied]
#   rt.<DOMAIN>                 → gateway (WS+SSE) [bypass]
#
# FE host (proxied) 의 /api · /ws · /sse · /actuator · /svc 는 모두 gateway 로
# proxy (same-origin 호출 유지). FE 코드가 WS/SSE 만 rt.<DOMAIN> 직접 호출
# 하려면 VITE_WS_URL / VITE_SSE_URL 환경변수 설정 (Phase 4).
#
# install.sh / Application/commerce 의 kustomize.patches 가 __DOMAIN__ 를
# 실제 도메인 (예: 1989v.com) 로 치환한다.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerce-proxied
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: commerce-platform
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager annotation 없음 — secretName cf-origin-ca-tls 는 수동 등록.
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __DOMAIN__
        - admin.__DOMAIN__
        - quant.__DOMAIN__
        - gft.__DOMAIN__
        - agent.__DOMAIN__
        - api.__DOMAIN__
      secretName: cf-origin-ca-tls
  rules:
    # ─── portal-fe (root) ───
    - host: __DOMAIN__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /sse
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /actuator
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /svc
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: portal-fe, port: { name: http } } }
    # ─── admin-fe ───
    - host: admin.__DOMAIN__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /sse
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /actuator
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /svc
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: admin-fe, port: { name: http } } }
    # ─── quant-fe ───
    - host: quant.__DOMAIN__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /sse
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /actuator
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /svc
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: quant-fe, port: { name: http } } }
    # ─── gifticon-fe (gft.<DOMAIN>) ───
    - host: gft.__DOMAIN__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /sse
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /actuator
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /svc
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: gifticon-fe, port: { name: http } } }
    # ─── agent-viewer-fe (agent.<DOMAIN>) ───
    - host: agent.__DOMAIN__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /sse
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /actuator
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /svc
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: agent-viewer-fe, port: { name: http } } }
    # ─── gateway API 전용 host (REST 위주) ───
    - host: api.__DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerce-rt
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: commerce-platform
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [rt.__DOMAIN__]
      secretName: rt-tls
  rules:
    # ─── gateway WS/SSE bypass host (Cloudflare proxy OFF) ───
    - host: rt.__DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: gateway, port: { name: http } } }
