# Let's Encrypt Staging — 발급량 제한 없음, 브라우저는 untrusted 로 표시.
# 첫 배포/디버깅 시 staging 으로 확인 후 prod 로 교체.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: __OCI_LE_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - http01:
          ingress:
            class: nginx
