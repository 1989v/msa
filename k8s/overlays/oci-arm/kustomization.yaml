apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# OCI Ampere A1 (arm64) single-node overlay.
#
# 베이스: k3s-lite (이미 리소스 절감 + Redis standalone + ClickHouse 메모리 상향 적용)
# 위에 다음을 더 얹는다:
#   - 커스텀 도메인 기반 host 라우팅 (FE 별 subdomain — admin/quant/gft/agent/api)
#   - cert-manager + Let's Encrypt HTTP01 challenge
#   - 24GB / 4 OCPU 안에서 전체 서비스 셋 가동
#
# 멀티 아키텍처 (arm64): 사용 중인 컨테이너 이미지가 전부 multi-arch 인지 확인.
#   - 인프라(MySQL/Kafka/Redis/ES/ClickHouse): 공식 이미지 multi-arch ✅
#   - JVM 서비스: Jib 빌드는 빌드 호스트 아키텍처 따라감.
#     로컬이 Apple Silicon 이면 그대로 arm64. Intel Mac 이면 platforms 추가 필요.
#   - FE: docker buildx build --platform linux/arm64
#
# 적용 절차 (요약):
#   1. DNS A 레코드 7종 등록: @(root), admin, quant, gft, agent, api, argocd → OCI public IP
#   2. ./k8s/overlays/oci-arm/scripts/render.sh <DOMAIN> <LE_EMAIL> | kubectl apply -f -
#      (또는 Argo CD 사용 시 ./k8s/argocd/install.sh ... <DOMAIN>)
#   3. cert-manager 가 ClusterIssuer 로 letsencrypt-prod 발급 (수 초~수 분, host 마다 별개 cert)
#   4. https://<DOMAIN> 접속 가능 (portal-fe 메인)
#
# 자세한 사전 작업(k3s 설치, 방화벽, ingress-nginx, cert-manager 설치)은 README 참조.
namespace: commerce
resources:
  - ../k3s-lite
  - cert-manager/cluster-issuer-staging.yaml
  - cert-manager/cluster-issuer-prod.yaml
  # Ingress 2개:
  # - commerce-proxied: 6 host (root + admin/quant/gft/agent/api) — CF proxy
  #   활성, secretName 은 수동 등록한 cf-origin-ca-tls (CF Origin CA 15년 cert).
  # - commerce-rt: rt.* — CF proxy 미사용 (WS/SSE bypass), Let's Encrypt HTTP01.
  # base 의 단일 path-routed Ingress 2개 (frontend, gateway) 는 아래 $patch:
  # delete 로 무력화.
  - ingresses/commerce-platform.yaml
  # cloudflared — Zero Trust Tunnel connector. Public Hostname / TCP route /
  # Access policy 는 Cloudflare dashboard 에서 관리. tunnel 토큰 Secret 은
  # cf-origin-ca-tls 와 동일하게 OCI 에서 수동 등록 (git 미포함).
  - cloudflared
patches:
  # ─── Kafka EXTERNAL listener — WARP 통한 외부 접근용 (kafka-ui macOS docker 등) ─
  # base 의 advertised 는 host-access(k3s-lite) 검증용 localhost:19092.
  # oci-arm 에선 외부 client 가 reconnect 시 사용할 public hostname 으로 교체.
  # CLIENT/INTERNAL listener 는 cluster-internal 그대로 (Spring Boot 서비스 영향 없음).
  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: kafka
      spec:
        template:
          spec:
            containers:
              - name: kafka
                env:
                  - name: KAFKA_CFG_ADVERTISED_LISTENERS
                    value: "CLIENT://kafka:9092,INTERNAL://kafka:29092,EXTERNAL://kafka.1989v.com:19092"
  # Kafka service 에 19092 port 추가 (Cloudflare Tunnel → cloudflared → kafka:19092).
  - target:
      kind: Service
      name: kafka
    patch: |-
      - op: add
        path: /spec/ports/-
        value:
          name: external
          port: 19092
          targetPort: 19092
  # ─── base 의 path-routed Ingress 2개 제거 (subdomain 라우팅으로 대체) ────────
  - patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: frontend
        namespace: commerce
  - patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: gateway
        namespace: commerce
  # ─── JVM tuning (모든 Deployment 에 주입, nginx 컨테이너는 무시함) ────────
  - path: patches/java-tool-options.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"
  # ─── OCIR pull secret (모든 앱 Pod spec 에 명시) ───────────────────────────
  - path: patches/image-pull-secret-deployment.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"
  - path: patches/image-pull-secret-cronjob.yaml
    target:
      kind: CronJob
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"
  - path: patches/image-pull-secret-job.yaml
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"
  # ─── Tier XL (1.2Gi) — analytics: Kafka Streams + RocksDB state store ────
  - path: patches/resources-xl-1200mi.yaml
    target:
      kind: Deployment
      name: analytics
  # ─── Tier L (1Gi) — quant: Phase 3 실시간 트레이딩 엔진 ──────────────────
  # code-dictionary 는 k3s-lite 베이스 패치에서 이미 1Gi 로 설정됨.
  - path: patches/resources-l-1gi.yaml
    target:
      kind: Deployment
      name: quant
  # ─── Tier S (512Mi) — Kafka consumer + 경량 JPA ─────────────────────────
  - path: patches/resources-s-512mi.yaml
    # ─── Tier M (768Mi) — k3s-lite 글로벌 기본값으로 충분, 별도 패치 없음 ────
    #     적용 대상: gateway, product, order, search, gifticon, fulfillment
    #     (gifticon/fulfillment 는 k3s-lite 의 동일값 명시 패치 보유)

    target: {kind: Deployment, name: experiment}
  - path: patches/resources-s-512mi.yaml
    target: {kind: Deployment, name: search-batch}
  - path: patches/resources-s-512mi.yaml
    target: {kind: Deployment, name: search-consumer}
  - path: patches/resources-s-512mi.yaml
    target: {kind: Deployment, name: recommendation}
  - path: patches/resources-s-512mi.yaml
    target: {kind: Deployment, name: recommendation-ann}
  - path: patches/resources-s-512mi.yaml
    target: {kind: Deployment, name: auth}
  - path: patches/resources-s-512mi.yaml
    target: {kind: Deployment, name: chatbot}
  # ─── Tier XS (384Mi) — 최소 CRUD ─────────────────────────────────────────
  - path: patches/resources-xs-384mi.yaml
    target: {kind: Deployment, name: member}
  - path: patches/resources-xs-384mi.yaml
    target: {kind: Deployment, name: wishlist}
  - path: patches/resources-xs-384mi.yaml
    target: {kind: Deployment, name: inventory}
  - path: patches/resources-xs-384mi.yaml
    target: {kind: Deployment, name: warehouse}
  - path: patches/resources-xs-384mi.yaml
    target: {kind: Deployment, name: agent-viewer-api}
  # ─── Tier FE (96Mi) — nginx static ────────────────────────────────────────
  - path: patches/resources-fe-96mi.yaml
    target: {kind: Deployment, name: portal-fe}
  - path: patches/resources-fe-96mi.yaml
    target: {kind: Deployment, name: admin-fe}
  - path: patches/resources-fe-96mi.yaml
    target: {kind: Deployment, name: quant-fe}
  - path: patches/resources-fe-96mi.yaml
    target: {kind: Deployment, name: gifticon-fe}
  - path: patches/resources-fe-96mi.yaml
    target: {kind: Deployment, name: agent-viewer-fe}
