# frontend ingress 에 host + TLS 추가. gateway 와 동일 hostname 공유.
#
# longer-prefix-first 매칭으로:
#   /admin/x      → admin-fe
#   /quant/x      → quant-fe
#   /gifticon/x   → gifticon-fe
#   /agent-viewer → agent-viewer-fe
#   /(root)       → portal-fe
# 단, gateway ingress 의 /api, /sse, /ws, /svc, /actuator 가 우선 매칭됨.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: commerce
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - commerce.__DOMAIN__
      secretName: frontend-nipio-tls
  rules:
    - host: commerce.__DOMAIN__
      http:
        paths:
          - path: /gifticon/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gifticon-fe
                port:
                  name: http
          - path: /agent-viewer/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-viewer-fe
                port:
                  name: http
          - path: /admin/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: admin-fe
                port:
                  name: http
          - path: /quant/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: quant-fe
                port:
                  name: http
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: portal-fe
                port:
                  name: http
