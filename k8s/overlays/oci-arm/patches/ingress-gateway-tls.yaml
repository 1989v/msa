# gateway ingress 에 host + TLS 추가.
#
# 단일 hostname `commerce.<DOMAIN>` 으로 모든 path 통합:
#   /api/...      → gateway (REST)
#   /sse/...      → gateway (SSE)
#   /ws/...       → gateway (WebSocket)
#   /svc/...      → gateway (actuator proxy)
#   /actuator/... → gateway (own actuator)
#
# render.sh / install.sh 가 __DOMAIN__ 를 실제 도메인 (예: 1989v.com) 로 치환.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: commerce
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - commerce.__DOMAIN__
      secretName: gateway-nipio-tls
  rules:
    - host: commerce.__DOMAIN__
      http:
        paths:
          - path: /api(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /sse(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /ws(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /svc/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /actuator(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
