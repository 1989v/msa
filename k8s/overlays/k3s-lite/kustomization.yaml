apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single-node k3d / k3s-lite overlay.
# Combines the local minimal infra (standalone MySQL/Redis/Kafka/ES/
# ClickHouse from Phase 3a) with the service base manifests
# (Phase 3b), then applies k3s-specific trim-downs: smaller resource
# requests, Redis standalone redirection, no HPA, no PDB.
#
# Apply with:
#   kubectl apply -k k8s/overlays/k3s-lite

namespace: commerce

resources:
  - ../../infra/local
  - ../../base
  # ADR-0031 Phase 1 — k3s-lite 에 NetworkPolicy 적용 (default-deny + 명시 허용 12종).
  # CNI 가 NetworkPolicy 지원해야 적용됨 (k3d 기본 Flannel 은 silent no-op → Calico/Cilium 권장).
  # 활성화 후 k8s/base/network-policy/README.md 의 smoke test 4단계 실행 필수.
  - ../../base/network-policy
  # NOTE: host-access (LoadBalancer Services for MySQL/Redis/ES/...) 는 base 에도 이 overlay 에도
  # 포함하지 않는다. oci-arm 이 이 overlay 를 상속받기 때문 — 인터넷 노출 환경에 LoadBalancer 로
  # MySQL/Redis 를 띄우면 보안 사고 직결.
  # k3d 로컬에서는 scripts/k3d-up.sh 가 별도로 `kubectl apply -k k8s/infra/local/host-access` 실행.

patches:
  # Global resource reduction — halves the base requests/limits for
  # every Spring Boot app so a single k3d node can host the full
  # platform. Tune individually if a service thrashes the GC.
  - path: patches/resources-reduce.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"

  # Smoke-test only: let Hibernate auto-create tables since the local
  # MySQL init script does not populate per-service schemas.
  - path: patches/ddl-auto-update.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"

  # k3s-lite: Spring Boot startup is slow on a loaded single-node
  # cluster. Add a startupProbe so the liveness probe does not kill
  # pods before they finish bootstrapping.
  - path: patches/startup-probe.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=commerce-platform"

  # Redis cluster -> standalone override. Only services whose
  # application-kubernetes.yml declares cluster.nodes get this patch.
  # Implementation: inject SPRING_APPLICATION_JSON env var with higher
  # precedence than yml files, overriding cluster config with
  # standalone host+port pointing at the Phase 3a redis Service.
  - path: patches/redis-standalone-gateway.yaml
    target:
      kind: Deployment
      name: gateway
  - path: patches/redis-standalone-product.yaml
    target:
      kind: Deployment
      name: product
  - path: patches/redis-standalone-gifticon.yaml
    target:
      kind: Deployment
      name: gifticon
  - path: patches/redis-standalone-analytics.yaml
    target:
      kind: Deployment
      name: analytics
  - path: patches/redis-standalone-experiment.yaml
    target:
      kind: Deployment
      name: experiment
  - path: patches/redis-standalone-code-dictionary.yaml
    target:
      kind: Deployment
      name: code-dictionary
  - path: patches/redis-standalone-search.yaml
    target:
      kind: Deployment
      name: search
  - path: patches/redis-standalone-auth.yaml
    target:
      kind: Deployment
      name: auth

  # code-dictionary needs more memory than the global 512Mi limit.
  - path: patches/code-dictionary-resources.yaml
    target:
      kind: Deployment
      name: code-dictionary

  # gifticon: 글로벌 512Mi limit 부족 → OOMKilled. 768Mi 로 상향.
  - path: patches/gifticon-resources.yaml
    target:
      kind: Deployment
      name: gifticon

  # ADR-0058: commerce 는 order+inventory+fulfillment+warehouse 4-도메인 모놀리스 →
  # 글로벌 reduce(768Mi) 로는 4 EMF/풀 워킹셋 부족. 1280Mi 로 상향.
  - path: patches/commerce-resources.yaml
    target:
      kind: Deployment
      name: commerce

  # quant Phase 2: replicas=1 강제 (Recreate) + KMS local + outbox kafka-relay enable
  # + Telegram dispatcher disabled (Bot Token 미설정 시) — TG-P2-15
  - path: patches/quant-phase2.yaml
    target:
      kind: Deployment
      name: quant

  # clickhouse: 1Gi limit 부족 → OOMKilled. 2Gi 로 상향.
  # analytics / experiment / quant 가 의존하므로 회복 시 연쇄 회복.
  - path: patches/clickhouse-resources.yaml
    target:
      kind: StatefulSet
      name: clickhouse

  # ADR-0036 P2-T20 — charting Hard remove 완료 (k8s/base/charting & charting-fe 삭제됨, 2026-05-02).
  # 잔여 backup script / configmap 잔재도 H1 + I6 (2026-05-05) 에서 정리 완료.
