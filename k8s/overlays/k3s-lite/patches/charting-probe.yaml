# charting is FastAPI/Python, not Spring Boot.
# The generic startup probe path (/actuator/health/liveness) returns 404.
# Override to /docs (FastAPI Swagger UI) which is always available.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: charting
spec:
  template:
    spec:
      containers:
        - name: app
          startupProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
