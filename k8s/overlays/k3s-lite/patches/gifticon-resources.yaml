# gifticon: 글로벌 resources-reduce(512Mi limit) 로는 부팅 후 OOMKilled.
# JPA + Kafka + Redis cluster client 합쳐 768Mi 가 안전선.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gifticon
spec:
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              cpu: 50m
              memory: 384Mi
            limits:
              memory: 768Mi
