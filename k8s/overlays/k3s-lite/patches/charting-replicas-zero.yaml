# charting Phase 2 폐기 준비 (ADR-0033 / ADR-001 Errata).
#
# Phase 1 종료 시점부터 트래픽을 quant 로 이행. charting deployment 는 본 패치로 replicas=0
# 로 강제하되 매니페스트는 보존(언제든지 롤백 가능).
#
# 활성화: k3s-lite kustomization.yaml 의 patches 에 본 파일을 추가하면 적용. 미추가 시
# replicas=1 (기존 동작) 유지 — 사용자가 트래픽 모니터링 후 결정.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: charting
spec:
  replicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: charting-fe
spec:
  replicas: 0
