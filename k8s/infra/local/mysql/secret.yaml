apiVersion: v1
kind: Secret
metadata:
  name: mysql-root
  namespace: commerce
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: commerce-platform
type: Opaque
stringData:
  # Local-only credentials. Do NOT use these values in prod/staging.
  # prod overlay replaces this Secret via SealedSecrets or ExternalSecrets.
  MYSQL_ROOT_PASSWORD: "localroot"
