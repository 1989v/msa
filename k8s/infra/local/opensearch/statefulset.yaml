apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: commerce
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: commerce-platform
spec:
  serviceName: opensearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: increase-vm-max-map
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
          securityContext:
            privileged: true
            runAsUser: 0
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.1
          imagePullPolicy: IfNotPresent
          # Korean nori analyzer 플러그인 보장 — 미설치 시 시작 전 설치 (bundled, 외부 다운로드 불요)
          command:
            - bash
            - -c
            - |
              if ! /usr/share/opensearch/bin/opensearch-plugin list | grep -q analysis-nori; then
                /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-nori
              fi
              exec /usr/share/opensearch/opensearch-docker-entrypoint.sh
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: discovery.type
              value: "single-node"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: cluster.name
              value: "commerce-local"
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 3Gi
