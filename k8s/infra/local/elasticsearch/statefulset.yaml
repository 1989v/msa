apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: commerce
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: commerce-platform
spec:
  serviceName: elasticsearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        # Single-node ES 8 refuses to start with the default vm.max_map_count
        # on macOS/Linux. The host setting is managed by the cluster, but we
        # also disable ML and security to keep the image small and stateless.
        - name: increase-vm-max-map
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
          securityContext:
            privileged: true
            runAsUser: 0
      containers:
        - name: elasticsearch
          # ES 9.x — Spring Boot 4.x 의 ES 9.x co-located client 와 정렬.
          # 8.15.3 ↔ 9.x client 는 media-type 헤더 호환성 문제로 search service 가 DOWN.
          image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
          imagePullPolicy: IfNotPresent
          # Korean nori analyzer 플러그인 보장 — code-dictionary 가 Nori tokenizer 사용
          # (search 서비스는 미사용, 단일 ES 클러스터 공유)
          command:
            - bash
            - -c
            - |
              if ! /usr/share/elasticsearch/bin/elasticsearch-plugin list | grep -q analysis-nori; then
                /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch analysis-nori
              fi
              exec /usr/local/bin/docker-entrypoint.sh elasticsearch
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.ml.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: cluster.name
              value: "commerce-local"
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 3Gi
