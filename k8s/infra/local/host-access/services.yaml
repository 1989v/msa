# host-access — 로컬 호스트(127.0.0.1)에서 클러스터 내부 인프라에 직접 붙기 위한
# LoadBalancer Services. k3d 의 klipper-lb 가 노드 컨테이너에서 호스트 포트를 listen
# 하고, k3d cluster create 시 `--port "<HOST>:<HOST>@loadbalancer"` 로 매핑된 포트가
# 머신의 localhost 로 라우팅된다.
#
# 호스트 포트는 일반적인 로컬 충돌을 피하려고 1-prefix 를 붙였다.
#   127.0.0.1:13306 → mysql
#   127.0.0.1:15432 → quant-postgres
#   127.0.0.1:16379 → redis
#   127.0.0.1:19200 → elasticsearch
#   127.0.0.1:18123 → clickhouse (HTTP)
#   127.0.0.1:19000 → clickhouse (native TCP)
#   127.0.0.1:19092 → kafka (EXTERNAL listener, statefulset 에서 별도 advertise)
#
# ⚠️ 이 overlay 는 LOCAL 전용이다. prod-k8s 에는 절대 포함하지 말 것.
# 자세한 보안 가이드는 README.md 참조.
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-host
  namespace: commerce
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: host-access
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: mysql
  ports:
    - name: mysql
      port: 13306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: quant-postgres-host
  namespace: commerce
  labels:
    app.kubernetes.io/name: quant-postgres
    app.kubernetes.io/component: host-access
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: quant-postgres
  ports:
    - name: postgres
      port: 15432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis-host
  namespace: commerce
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: host-access
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 16379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-host
  namespace: commerce
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/component: host-access
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 19200
      targetPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-host
  namespace: commerce
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: host-access
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 18123
      targetPort: 8123
    - name: native
      port: 19000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-host
  namespace: commerce
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: host-access
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: external
      port: 19092
      targetPort: 19092
