# Quant Phase 3 (실매매) Prometheus 알람 규칙 (ADR-0037 / TG-P3-41).
#
# Apply (k3s-lite + kube-prometheus-stack 가정):
#   kubectl apply -k k8s/infra/local/monitoring
#
# 본 ConfigMap 은 PrometheusRule CR 로 wrap 되거나, 단독 ConfigMap 으로 prometheus reload 시 picked up.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: quant-phase3-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: commerce-platform
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: quant-phase3
      interval: 30s
      rules:
        # P1 — Audit chain 무결성 깨짐
        - alert: QuantAuditChainVerifyFailed
          expr: |
            sum(rate(quant_audit_chain_verify_total{result="fail"}[10m])) > 0
          for: 1m
          labels:
            severity: critical
            service: quant
          annotations:
            summary: "[P1] Quant audit chain verify FAILED"
            description: "audit_event SHA-256 chain mismatch — 변조 가능성. tenant suspend + 운영자 즉시 개입."

        # P1 — 글로벌 kill-switch 활성 (운영자 인지)
        - alert: QuantGlobalKillSwitchOn
          expr: quant_kill_switch_state{scope="global"} == 1
          for: 30s
          labels:
            severity: critical
            service: quant
          annotations:
            summary: "[P1] Quant GLOBAL kill-switch is ON"
            description: "전체 사용자의 실매매가 차단됨. 자동 trigger 였는지 manual 이었는지 audit_event 확인."

        # P2 — Reconcile drift burst
        - alert: QuantReconcileDriftBurst
          expr: |
            sum by (exchange) (rate(quant_reconcile_drift_total[5m])) > 0.2
          for: 5m
          labels:
            severity: warning
            service: quant
          annotations:
            summary: "[P2] Reconcile drift burst on {{ $labels.exchange }}"
            description: "5분 평균 drift > 1건/5초. 거래소 응답 schema 변경 / 네트워크 / 내부 로직 결함 의심."

        # P2 — Risk limit breach burst
        - alert: QuantRiskLimitBreachBurst
          expr: |
            sum(rate(quant_risk_limit_breach_total[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            service: quant
          annotations:
            summary: "[P2] Risk limit breach burst"
            description: "5분 평균 한도 초과 5건 이상 → 사용자 다수가 한계 도달. 정책 점검 필요."

        # P2 — Live order latency p99 SLA 위반
        - alert: QuantLiveOrderLatencyP99High
          expr: |
            histogram_quantile(0.99,
              sum by (exchange, le) (rate(quant_live_order_latency_seconds_bucket[5m]))
            ) > 1.5
          for: 10m
          labels:
            severity: warning
            service: quant
          annotations:
            summary: "[P2] Live order p99 latency > 1.5s on {{ $labels.exchange }}"
            description: "ADR-0037 SLA 위반 (p99 1.5s). 거래소 latency / 네트워크 / 어댑터 retry 조정 필요."

        # P3 — 2FA 검증 실패 burst (brute-force)
        - alert: QuantTwoFaFailureBurst
          expr: |
            sum(rate(quant_2fa_verify_total{result="failure"}[5m])) > 0.5
          for: 5m
          labels:
            severity: info
            service: quant
          annotations:
            summary: "[P3] 2FA failure burst — possible brute force"
            description: "5분 30건 이상 실패. RateLimiter 가 1차 방어 — 운영자 IP 차단 검토."
