apiVersion: v1
kind: Secret
metadata:
  name: backup-secret
  namespace: commerce
  labels:
    app.kubernetes.io/name: backup-runner
    app.kubernetes.io/part-of: commerce-platform
type: Opaque
# PLAINTEXT PLACEHOLDERS — replace every entry with a SealedSecret
# before apply in a real environment. See
# k8s/infra/prod/sealed-secrets/README.md for the workflow.
stringData:
  MYSQL_ROOT_PASSWORD: "replace-with-sealed-secret"
  MYSQL_BACKUP_PASSWORD: "replace-with-sealed-secret"
  PG_PASSWORD: "replace-with-sealed-secret"
  AWS_ACCESS_KEY_ID: "replace-with-sealed-secret"
  AWS_SECRET_ACCESS_KEY: "replace-with-sealed-secret"
  ALERT_WEBHOOK_URL: ""
