# Topics matching docs/architecture/kafka-convention.md and the
# publish/consume references in each service's application.yml.
# Strimzi Topic Operator reconciles these into real Kafka topics.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: product.item.created
  namespace: commerce
  labels:
    strimzi.io/cluster: commerce
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "604800000"
    min.insync.replicas: "2"
---
