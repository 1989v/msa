# ADR-0055 — ECK Elasticsearch (8.15.3) 에서 OpenSearch Operator 로 전환.
# 토폴로지는 기존 ECK 구성과 동일: cluster_manager 3 + data/ingest 2.
apiVersion: opensearch.opster.io/v1
kind: OpenSearchCluster
metadata:
  name: commerce-os
  namespace: commerce
spec:
  general:
    serviceName: commerce-os
    version: 3.3.0
    httpPort: 9200
    # Korean nori analyzer — search(products) + code-dictionary 공용
    pluginsList: ["analysis-nori"]
    setVMMaxMapCount: true
  dashboards:
    enable: false
    version: 3.3.0
    replicas: 0
  nodePools:
    - component: master
      replicas: 3
      roles: ["cluster_manager"]
      diskSize: "5Gi"
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          memory: 2Gi
      jvm: "-Xms1g -Xmx1g"
    - component: data
      replicas: 2
      roles: ["data", "ingest"]
      diskSize: "20Gi"
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 4Gi
      jvm: "-Xms2g -Xmx2g"
---
# Alias Service — 앱은 호스트명 "opensearch" 로 접속 (local overlay 와 동일 이름).
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: commerce
spec:
  selector:
    opster.io/opensearch-cluster: commerce-os
    opster.io/opensearch-nodepool: data
  ports:
    - name: http
      port: 9200
      targetPort: 9200
