apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: commerce-clickhouse
  namespace: commerce
spec:
  configuration:
    users:
      # 평문 password 금지 — commerce-clickhouse-secrets 는 SealedSecret 으로 공급 (README 참조)
      analytics/k8s_secret_password: commerce/commerce-clickhouse-secrets/analytics-password
      analytics/networks/ip:
        - "::/0"
        - "0.0.0.0/0"
      analytics/profile: default
      analytics/quota: default
    profiles:
      default/max_memory_usage: "2000000000"
      default/use_uncompressed_cache: "0"
    clusters:
      - name: commerce
        layout:
          # 의도된 싱글턴 (1 shard × 1 replica = 인스턴스 1개, 데이터 중복 없음).
          # analytics 데이터는 Kafka 재처리로 복구 가능하다는 전제. HA 가 필요해지면
          # shardsCount 확장 전에 ReplicatedMergeTree 스키마 전환이 선행돼야 한다.
          shardsCount: 1
          replicasCount: 1
  templates:
    podTemplates:
      - name: clickhouse-pod
        spec:
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:24.8-alpine
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  memory: 2Gi
    volumeClaimTemplates:
      - name: data-volume
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
  defaults:
    templates:
      podTemplate: clickhouse-pod
      dataVolumeClaimTemplate: data-volume
---
# Alias Service so "clickhouse:8123" keeps resolving from app yml.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: commerce
spec:
  selector:
    clickhouse.altinity.com/chi: commerce-clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
