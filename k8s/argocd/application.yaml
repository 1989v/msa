# Argo CD Application — commerce 플랫폼 단일 앱.
# install.sh 가 __GITHUB_REPO_URL__ 을 실제 git URL 로 치환한 뒤 apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: commerce
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: __GITHUB_REPO_URL__
    targetRevision: main
    path: k8s/overlays/oci-arm

  destination:
    server: https://kubernetes.default.svc
    namespace: commerce   # 대부분 commerce ns 로 떨어짐. ClusterIssuer 는 cluster-scoped.

  syncPolicy:
    automated:
      prune: true        # git 에서 사라진 리소스를 클러스터에서도 삭제
      selfHeal: true     # 수동 kubectl edit 등을 git 상태로 자동 되돌림
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true       # kustomize 매니페스트 크기 회피
      - PruneLast=true             # 의존 순서 유지
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # cert-manager 가 자동 채우는 secret(*-tls) 의 diff 무시
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
