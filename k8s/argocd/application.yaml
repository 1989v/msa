# Argo CD Application — commerce 플랫폼 단일 앱.
# install.sh 가 repo URL 과 OCI 환경별 값(IP/email)을 치환한 뒤 apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: commerce
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: __GITHUB_REPO_URL__
    targetRevision: main
    path: k8s/overlays/oci-arm
    kustomize:
      # Argo CD 는 overlay 의 scripts/render.sh 를 실행하지 않는다.
      # 환경별 도메인 host / Let's Encrypt email 은 Application-level
      # inline patches 로 주입한다. install.sh 가 __DOMAIN__ /
      # __OCI_LE_EMAIL__ / __GITHUB_REPO_URL__ 를 sed 로 치환.
      patches:
        # commerce 통합 Ingress — 7 host (rules + tls) 각각 __DOMAIN__ 치환.
        # rules / tls 순서는 ingresses/commerce-platform.yaml 의 정의 순서:
        #   0: <DOMAIN> (root, portal-fe)
        #   1: admin.<DOMAIN>
        #   2: quant.<DOMAIN>
        #   3: gft.<DOMAIN>
        #   4: agent.<DOMAIN>
        #   5: api.<DOMAIN>   (Cloudflare proxy ON, REST 위주)
        #   6: rt.<DOMAIN>    (Cloudflare proxy OFF, WS/SSE bypass)
        - target:
            group: networking.k8s.io
            kind: Ingress
            name: commerce
          patch: |-
            - op: replace
              path: /spec/rules/0/host
              value: __DOMAIN__
            - op: replace
              path: /spec/rules/1/host
              value: admin.__DOMAIN__
            - op: replace
              path: /spec/rules/2/host
              value: quant.__DOMAIN__
            - op: replace
              path: /spec/rules/3/host
              value: gft.__DOMAIN__
            - op: replace
              path: /spec/rules/4/host
              value: agent.__DOMAIN__
            - op: replace
              path: /spec/rules/5/host
              value: api.__DOMAIN__
            - op: replace
              path: /spec/rules/6/host
              value: rt.__DOMAIN__
            - op: replace
              path: /spec/tls/0/hosts/0
              value: __DOMAIN__
            - op: replace
              path: /spec/tls/1/hosts/0
              value: admin.__DOMAIN__
            - op: replace
              path: /spec/tls/2/hosts/0
              value: quant.__DOMAIN__
            - op: replace
              path: /spec/tls/3/hosts/0
              value: gft.__DOMAIN__
            - op: replace
              path: /spec/tls/4/hosts/0
              value: agent.__DOMAIN__
            - op: replace
              path: /spec/tls/5/hosts/0
              value: api.__DOMAIN__
            - op: replace
              path: /spec/tls/6/hosts/0
              value: rt.__DOMAIN__
        # DNS01 issuer 에도 이메일 주입 (CF proxy 활성 시 사용).
        - target:
            group: cert-manager.io
            kind: ClusterIssuer
            name: letsencrypt-prod-dns01
          patch: |-
            - op: replace
              path: /spec/acme/email
              value: __OCI_LE_EMAIL__
        - target:
            group: cert-manager.io
            kind: ClusterIssuer
            name: letsencrypt-prod
          patch: |-
            - op: replace
              path: /spec/acme/email
              value: __OCI_LE_EMAIL__
        - target:
            group: cert-manager.io
            kind: ClusterIssuer
            name: letsencrypt-staging
          patch: |-
            - op: replace
              path: /spec/acme/email
              value: __OCI_LE_EMAIL__

  destination:
    server: https://kubernetes.default.svc
    namespace: commerce   # 대부분 commerce ns 로 떨어짐. ClusterIssuer 는 cluster-scoped.

  syncPolicy:
    automated:
      prune: true        # git 에서 사라진 리소스를 클러스터에서도 삭제
      selfHeal: true     # 수동 kubectl edit 등을 git 상태로 자동 되돌림
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true       # kustomize 매니페스트 크기 회피
      - PruneLast=true             # 의존 순서 유지
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # 운영에 영향 없는 cosmetic drift 무시 — sync 상태를 Healthy 로 유지.
  ignoreDifferences:
    # cert-manager 가 자동 채우는 secret(*-tls) 의 diff
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # K8s 가 StatefulSet 적용 시 자동 추가하는 기본 필드 (volumeClaimTemplates
    # 의 volumeMode/creationTimestamp/status 등). 6 StatefulSet (mysql, redis,
    # kafka, elasticsearch, clickhouse, quant-postgres) 가 영구 OutOfSync 표시
    # 되는 원인. volumeClaimTemplates 자체 변경 (PVC 사이즈 등) 은 Argo CD
    # 가 못 잡으므로 변경 시엔 수동 kubectl apply 필요.
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
