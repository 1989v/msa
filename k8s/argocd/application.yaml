# Argo CD Application — commerce 플랫폼 단일 앱.
# install.sh 가 repo URL 과 OCI 환경별 값(IP/email)을 치환한 뒤 apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: commerce
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: __GITHUB_REPO_URL__
    targetRevision: main
    path: k8s/overlays/oci-arm
    kustomize:
      # Argo CD 는 overlay 의 scripts/render.sh 를 실행하지 않는다.
      # 환경별 도메인 host / Let's Encrypt email 은 Application-level
      # inline patches 로 주입한다. install.sh 가 __DOMAIN__ /
      # __OCI_LE_EMAIL__ / __GITHUB_REPO_URL__ 를 sed 로 치환.
      patches:
        - target:
            group: networking.k8s.io
            kind: Ingress
            name: gateway
          patch: |-
            - op: replace
              path: /spec/tls/0/hosts/0
              value: commerce.__DOMAIN__
            - op: replace
              path: /spec/rules/0/host
              value: commerce.__DOMAIN__
        - target:
            group: networking.k8s.io
            kind: Ingress
            name: frontend
          patch: |-
            - op: replace
              path: /spec/tls/0/hosts/0
              value: commerce.__DOMAIN__
            - op: replace
              path: /spec/rules/0/host
              value: commerce.__DOMAIN__
        - target:
            group: cert-manager.io
            kind: ClusterIssuer
            name: letsencrypt-prod
          patch: |-
            - op: replace
              path: /spec/acme/email
              value: __OCI_LE_EMAIL__
        - target:
            group: cert-manager.io
            kind: ClusterIssuer
            name: letsencrypt-staging
          patch: |-
            - op: replace
              path: /spec/acme/email
              value: __OCI_LE_EMAIL__

  destination:
    server: https://kubernetes.default.svc
    namespace: commerce   # 대부분 commerce ns 로 떨어짐. ClusterIssuer 는 cluster-scoped.

  syncPolicy:
    automated:
      prune: true        # git 에서 사라진 리소스를 클러스터에서도 삭제
      selfHeal: true     # 수동 kubectl edit 등을 git 상태로 자동 되돌림
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true       # kustomize 매니페스트 크기 회피
      - PruneLast=true             # 의존 순서 유지
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # cert-manager 가 자동 채우는 secret(*-tls) 의 diff 무시
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
