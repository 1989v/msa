apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-ann
  namespace: commerce
  labels:
    app.kubernetes.io/name: recommendation-ann
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendation-ann
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendation-ann
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: recommendation-ann
      terminationGracePeriodSeconds: 30
      # Phase 3.5 — image baked-in models 대신 PVC mount (Argo Job 이 학습 결과 PVC 에 적재).
      # 모델 부재 시 ann 은 degraded 모드로 기동 (학습 완료 후 reindex 호출 시 enabled).
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: recommendation-models
      containers:
        - name: app
          image: commerce/recommendation-ann:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
