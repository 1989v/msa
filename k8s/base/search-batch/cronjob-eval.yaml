apiVersion: batch/v1
kind: CronJob
metadata:
  name: search-eval-daily
  namespace: commerce
  labels:
    app.kubernetes.io/name: search-batch
    app.kubernetes.io/part-of: commerce-platform
    app.kubernetes.io/component: eval
spec:
  # ADR-0050 Phase 4 — 매일 02:00 UTC (KST 11:00) 검색 ranking 오프라인 평가
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: search-batch
            app.kubernetes.io/component: eval
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          containers:
            - name: eval
              image: commerce/search-batch:latest
              imagePullPolicy: IfNotPresent
              args:
                - "--spring.batch.job.name=searchEvaluationJob"
                - "--search.eval.enabled=true"
                - "--search.eval.variant=baseline"
              env:
                - name: ELASTICSEARCH_URIS
                  value: "http://elasticsearch:9200"
                - name: SEARCH_EVAL_CLICKHOUSE_URL
                  value: "jdbc:clickhouse://clickhouse:8123/analytics"
                - name: SEARCH_EVAL_CLICKHOUSE_USER
                  value: "analytics"
                - name: SEARCH_EVAL_CLICKHOUSE_PASSWORD
                  value: "analytics"
              resources:
                requests: { cpu: 100m, memory: 512Mi }
                limits:   { memory: 1Gi }
