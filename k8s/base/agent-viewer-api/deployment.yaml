apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-viewer-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: agent-viewer-api
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-viewer-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-viewer-api
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: agent-viewer-api
      terminationGracePeriodSeconds: 45
      containers:
        - name: app
          image: commerce/agent-viewer-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
