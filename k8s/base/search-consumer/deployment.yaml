apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-consumer
  namespace: commerce
  labels:
    app.kubernetes.io/name: search-consumer
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: search-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: search-consumer
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: search-consumer
      terminationGracePeriodSeconds: 60
      containers:
        - name: app
          image: commerce/search-consumer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              # Kafka consumers need longer drain for in-flight batches.
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
