# ADR-0031 §5.11 — ingress-nginx → FE Pod ingress 허용 (Phase 1 결함 보정)
#
# 02-allow-ingress-to-gateway 가 gateway 만 다루기 때문에 admin-fe / gifticon-fe /
# agent-viewer-fe / portal-fe / quant-fe 로 가는 ingress-nginx 트래픽이
# default-deny-all 에 의해 차단된다 (k3d 로컬 검증 2026-05-03 — 모든 FE 진입이 502 Bad Gateway).
#
# 본 정책은 commerce ns 의 FE 계열 Pod 에 ingress-nginx ns 의 Pod 만 :80 으로 호출
# 허용한다. 경계 안전성: ingress-nginx 에서만 들어오는 것이 보장됨.
# (charting / charting-fe 는 ADR-0036 P2-T20 에서 Hard remove 되어 제외됨, 2026-05-02.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: commerce-platform
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - admin-fe
          - gifticon-fe
          - agent-viewer-fe
          - portal-fe
          - quant-fe
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - { port: 80, protocol: TCP }
