# ADR-0031 §1 (table) — 백엔드 → Elasticsearch :9200
#
# search 계열 서비스 (search, search-batch, search-consumer) 와 code-dictionary 가
# Elasticsearch 를 호출한다 (code-dictionary 는 OS → ES 통합 완료, Nori plugin 사용).
#
# 라벨 선택 근거:
#   - k8s/infra/local/elasticsearch/service.yaml:8 (app.kubernetes.io/name=elasticsearch)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-search
  namespace: commerce
  labels:
    app.kubernetes.io/part-of: commerce-platform
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - { key: app.kubernetes.io/part-of, operator: In, values: [commerce-platform] }
              - { key: app.kubernetes.io/name, operator: NotIn, values: [mysql, redis, kafka, elasticsearch, clickhouse] }
      ports:
        - { port: 9200, protocol: TCP }
