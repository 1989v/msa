apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-dictionary
  namespace: commerce
  labels:
    app.kubernetes.io/name: code-dictionary
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-dictionary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-dictionary
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: code-dictionary
      terminationGracePeriodSeconds: 45
      containers:
        - name: app
          image: commerce/code-dictionary:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8089
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            # K8s auto-injects OPENSEARCH_PORT=tcp://<ip>:9200 from the
            # opensearch Service. Spring binds that to opensearch.port (int)
            # and fails with NumberFormatException. Explicit override fixes it.
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_HOST
              value: "opensearch"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
