apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: commerce
  labels:
    app.kubernetes.io/name: analytics
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: analytics
      terminationGracePeriodSeconds: 60
      containers:
        - name: app
          image: commerce/analytics:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            # ClickHouse and Redis defaults fall through from
            # application-kubernetes.yml. Passwords come from Secret
            # in production overlay.
            - name: CLICKHOUSE_USER
              value: "analytics"
            - name: CLICKHOUSE_PASSWORD
              value: "analytics"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              # Kafka Streams consumer — give it time to commit offsets.
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
