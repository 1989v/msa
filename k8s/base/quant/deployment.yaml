apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant
  namespace: commerce
  labels:
    app.kubernetes.io/name: quant
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quant
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: quant
      terminationGracePeriodSeconds: 60
      containers:
        - name: app
          image: commerce/quant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8094
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: DB_USERNAME
              value: "quant"
            - name: DB_PASSWORD
              value: "quant"
            # ClickHouse `quant` DB — ohlcv read + ranking VIEW + DART corp_codes + investor_flows
            # ingest cronjob 들과 동일 host/port. user 는 read 권한 보유한 analytics 계정 재사용.
            - name: QUANT_CH_URL
              value: "jdbc:clickhouse://clickhouse:8123/quant"
            - name: QUANT_CH_USERNAME
              value: "analytics"
            - name: QUANT_CH_PASSWORD
              value: "analytics"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              # Backtest engine — allow in-flight runs to finalize and outbox flush.
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
