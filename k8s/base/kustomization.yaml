apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Aggregates every Spring Boot app module's base manifests.
# Environment-specific patches (replicas, resources, HPA, PDB, Secret
# injection, Redis cluster->standalone rewrite for k3s-lite) live in
# k8s/overlays/<env>/ and reference this directory as their base.
# DO NOT apply this directory directly for a real environment; use an
# overlay instead.
namespace: commerce
resources:
  - gateway
  - product
  # ADR-0058: order 는 inventory(commerce) 로 폴드 — 별도 Deployment 없음 (스키마 order_db·토픽 유지)
  - search
  - search-consumer
  - search-batch
  - auth
  - gifticon
  - commerce
  # ADR-0058: warehouse·fulfillment 는 inventory(commerce) 로 폴드 — 별도 Deployment 없음
  # (스키마 warehouse_db/fulfillment_db 는 유지, fulfillment.order.* 토픽도 commerce 가 발행)
  - analytics
  - experiment
  - chatbot
  - code-dictionary
  - quant
  - quant-ingest
  - recommendation
  - recommendation-ann
  # Frontend + non-JVM services (Phase 7 extension)
  - portal-fe
  - gifticon-fe
  - admin-fe
  - quant-fe
  - frontend-ingress.yaml

patches:
  # Pod 하드닝 (모든 환경 공통). JVM 은 Jib user 1000 전제로 runAsNonRoot,
  # nginx FE / 비 JVM 은 최소 capability 집합. 대상은 anchored regex 매칭.
  - path: patches/securitycontext-jvm.yaml
    target:
      kind: Deployment
      name: "(gateway|product|search|search-consumer|auth|gifticon|commerce|analytics|experiment|chatbot|code-dictionary|quant|recommendation)"
  - path: patches/securitycontext-web.yaml
    target:
      kind: Deployment
      name: "(portal-fe|gifticon-fe|admin-fe|quant-fe|recommendation-ann)"
