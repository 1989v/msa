apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: commerce
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: commerce-platform
  annotations:
    # Local dev: no TLS redirect. prod overlay flips this and adds a
    # cert-manager ClusterIssuer annotation (Phase 4).
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # /api(/.*)? 는 frontend ingress 의 /(.*) catch-all 보다 더 긴 regex 라
          # nginx-ingress longer-prefix-first 매칭에서 우선 잡혀 gateway 로 라우팅된다.
          # (이전 path: / 는 frontend /(.*) 가 가로채 portal-fe HTML 을 반환했음)
          - path: /api(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
