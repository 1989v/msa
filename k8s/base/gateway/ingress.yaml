apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: commerce
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: commerce-platform
  annotations:
    # Local dev: no TLS redirect. prod overlay flips this and adds a
    # cert-manager ClusterIssuer annotation (Phase 4).
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # nginx-ingress longer-prefix-first 매칭으로 gateway 가 frontend /(.*)
          # catch-all 보다 우선 잡혀야 함. 따라서 다음 path 들은 모두 gateway 로:
          #   /api(/.*)?     — REST API (JWT 가드)
          #   /svc/(.*)      — actuator 프록시 (admin 시스템 대시보드 health 표시용)
          #   /actuator(/.*)?— gateway 자체 actuator
          - path: /api(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /svc/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /actuator(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  name: http
