apiVersion: apps/v1
kind: Deployment
metadata:
  name: charting
  namespace: commerce
  labels:
    app.kubernetes.io/name: charting
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: charting
  template:
    metadata:
      labels:
        app.kubernetes.io/name: charting
        app.kubernetes.io/part-of: commerce-platform
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: commerce/charting:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8010
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
