apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  namespace: commerce
  labels:
    app.kubernetes.io/name: recommendation
    app.kubernetes.io/part-of: commerce-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendation
        app.kubernetes.io/part-of: commerce-platform
    spec:
      serviceAccountName: recommendation
      terminationGracePeriodSeconds: 45
      containers:
        - name: app
          image: commerce/recommendation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8092
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: CLICKHOUSE_HOST
              value: "clickhouse"
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_USER
              value: "analytics"
            - name: CLICKHOUSE_PASSWORD
              value: "analytics"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
