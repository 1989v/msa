---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: quant-ingest-30m
  namespace: commerce
  labels:
    app.kubernetes.io/name: quant-ingest
    quant.kgd.io/interval: "30m"
spec:
  # 30분봉: 매 시간 +35분 (시간봉과 충돌 회피)
  schedule: "35 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          containers:
            - name: ingest
              image: commerce/quant-ingest:latest
              imagePullPolicy: IfNotPresent
              args: ["--mode=incremental", "--interval=30m", "--lookback-days=7"]
              env:
                - name: CLICKHOUSE_HOST
                  value: "clickhouse"
                - name: CLICKHOUSE_PORT
                  value: "8123"
                - name: CLICKHOUSE_DB
                  value: "quant"
                - name: CLICKHOUSE_USER
                  value: "analytics"
                - name: CLICKHOUSE_PASSWORD
                  value: "analytics"
              resources:
                requests: { cpu: 50m, memory: 256Mi }
                limits:   { memory: 512Mi }
