# Long-term interval ingest — 주봉/월봉/년봉.
# 1w/1mo 는 yfinance 가 직접 지원, 1y 는 1mo 12배수로 fallback (scheduler 에서 처리).
# daily 와 별도로 매일 1회 실행 (장기봉은 갱신 빈도 낮음).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: quant-ingest-weekly
  namespace: commerce
  labels:
    app.kubernetes.io/name: quant-ingest
    app.kubernetes.io/part-of: commerce-platform
    quant.kgd.io/interval: "1w"
spec:
  # 주봉: 매일 KST 17:00 (UTC 08:00) — daily 끝나고 30분 후
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: quant-ingest
            app.kubernetes.io/part-of: commerce-platform
            quant.kgd.io/interval: "1w"
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          containers:
            - name: ingest
              image: commerce/quant-ingest:latest
              imagePullPolicy: IfNotPresent
              args: ["--mode=incremental", "--interval=1w", "--lookback-days=730"]
              env:
                - name: CLICKHOUSE_HOST
                  value: "clickhouse"
                - name: CLICKHOUSE_PORT
                  value: "8123"
                - name: CLICKHOUSE_DB
                  value: "quant"
                - name: CLICKHOUSE_USER
                  value: "analytics"
                - name: CLICKHOUSE_PASSWORD
                  value: "analytics"
              resources:
                requests: { cpu: 50m, memory: 256Mi }
                limits:   { memory: 512Mi }
---
