              image: commerce/quant-ingest:latest
              imagePullPolicy: IfNotPresent
              args: ["--mode=incremental", "--interval=1y", "--lookback-days=1825"]
              env:
                - name: CLICKHOUSE_HOST
                  value: "clickhouse"
                - name: CLICKHOUSE_PORT
                  value: "8123"
                - name: CLICKHOUSE_DB
                  value: "quant"
