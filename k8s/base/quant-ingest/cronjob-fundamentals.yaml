# V011 — yfinance Ticker.info 기반 fundamentals 일별 ingest.
# 미국 시장 마감(EST 16:00 = UTC 21:00) + 30 분 여유 → UTC 21:30, 매일.
# 주말도 실행 (yfinance 가 historical info 제공).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: quant-ingest-fundamentals
  namespace: commerce
  labels:
    app.kubernetes.io/name: quant-ingest
    app.kubernetes.io/part-of: commerce-platform
    quant.kgd.io/job: "fundamentals"
spec:
  schedule: "30 21 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: quant-ingest
            app.kubernetes.io/part-of: commerce-platform
            quant.kgd.io/job: "fundamentals"
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          containers:
            - name: ingest
              image: commerce/quant-ingest:latest
              imagePullPolicy: IfNotPresent
              args: ["--job=fundamentals"]
              env:
                - name: CLICKHOUSE_HOST
                  value: "clickhouse"
                - name: CLICKHOUSE_PORT
                  value: "8123"
                - name: CLICKHOUSE_DB
                  value: "quant"
                - name: CLICKHOUSE_USER
                  value: "analytics"
                - name: CLICKHOUSE_PASSWORD
                  value: "analytics"
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits:   { memory: 512Mi }
