# ADR-0040 — 매매주체 일별 ingest CronJob.
# pykrx 가 KRX 매매주체 통계를 가져옴 (장 마감 후 익일 ~09:00 KST 갱신).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: quant-ingest-investor-flows
  namespace: commerce
  labels:
    app.kubernetes.io/name: quant-ingest
    app.kubernetes.io/part-of: commerce-platform
    quant.kgd.io/job: "investor-flows"
spec:
  # 매매주체: KST 18:00 = UTC 09:00 (KOSPI/KOSDAQ 마감 + 데이터 갱신 여유)
  # 평일만. 주말은 데이터 변경 없음.
  schedule: "0 9 * * 1-5"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: quant-ingest
            quant.kgd.io/job: "investor-flows"
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          containers:
            - name: ingest
              image: commerce/quant-ingest:latest
              imagePullPolicy: IfNotPresent
              # 마지막 2일치 (당일 + 직전 거래일) — 멱등 INSERT (ReplacingMergeTree)
              args: ["--job=investor-flows", "--lookback-days=2"]
              env:
                - name: CLICKHOUSE_HOST
                  value: "clickhouse"
                - name: CLICKHOUSE_PORT
                  value: "8123"
                - name: CLICKHOUSE_DB
                  value: "quant"
                - name: CLICKHOUSE_USER
                  value: "analytics"
                - name: CLICKHOUSE_PASSWORD
                  value: "analytics"
              resources:
                requests: { cpu: 100m, memory: 384Mi }
                limits:   { memory: 768Mi }
