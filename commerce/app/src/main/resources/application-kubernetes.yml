spring:
  datasource:
    master:
      jdbc-url: jdbc:mysql://mysql-inventory-master:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    replica:
      jdbc-url: jdbc:mysql://mysql-inventory-replica:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    # ADR-0058: commerce fold — warehouse/fulfillment/order 전용 datasource (k8s per-service MySQL).
    # username/password 는 default application.yml 의 env 디폴트(warehouse_user 등) 사용.
    warehouse:
      master:
        jdbc-url: jdbc:mysql://mysql-warehouse-master:3306/warehouse_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      replica:
        jdbc-url: jdbc:mysql://mysql-warehouse-replica:3306/warehouse_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    fulfillment:
      master:
        jdbc-url: jdbc:mysql://mysql-fulfillment-master:3306/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      replica:
        jdbc-url: jdbc:mysql://mysql-fulfillment-replica:3306/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    order:
      master:
        jdbc-url: jdbc:mysql://mysql-order-master:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      replica:
        jdbc-url: jdbc:mysql://mysql-order-replica:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    # ADR-0058 round 2 — member/wishlist 전용 datasource (k8s per-service MySQL).
    member:
      master:
        jdbc-url: jdbc:mysql://mysql-member-master:3306/member_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      replica:
        jdbc-url: jdbc:mysql://mysql-member-replica:3306/member_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    wishlist:
      master:
        jdbc-url: jdbc:mysql://mysql-wishlist-master:3306/wishlist_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      replica:
        jdbc-url: jdbc:mysql://mysql-wishlist-replica:3306/wishlist_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  kafka:
    bootstrap-servers: kafka:29092
  data:
    redis:
      host: redis-1
      port: 6379

# ADR-0029 PR-9 — processed_event 7일 retention cleanup 스케줄러 활성화.
# common 의 IdempotentEventCleanupScheduler 가 매일 cron 시각에 retention 보다 오래된 row 를 삭제.
# 5 서비스 cron 시간 분산 (DB 부하 분산):
#   inventory   03:30, order 03:00, fulfillment 03:15, product 03:45, quant 04:00 (Asia/Seoul).
kgd:
  common:
    messaging:
      idempotent:
        cleanup:
          enabled: true
          retention: P7D
          cron: "0 30 3 * * *"
          zone: Asia/Seoul
