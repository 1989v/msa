spring:
  application:
    name: place-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://localhost:3306/place_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:place_user}
    password: ${MYSQL_PASSWORD:place_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  # Flyway+validate — 스키마 변경은 Flyway 단독 책임 (jpa-persistence.md)
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

opensearch:
  uris: ${OPENSEARCH_URIS:http://localhost:9200}

place:
  seed:
    enabled: ${PLACE_SEED_ENABLED:false}
    regions-path: ${PLACE_SEED_REGIONS_PATH:/seed/regions.jsonl}
    pois-path: ${PLACE_SEED_POIS_PATH:/seed/pois.jsonl}
  poi:
    index: ${PLACE_POI_INDEX:poi}

server:
  port: 8096
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
