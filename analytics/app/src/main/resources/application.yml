server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: analytics-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    clickhouse:
      url: jdbc:clickhouse://localhost:8123/analytics
      username: analytics
      password: analytics
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analytics-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.kgd.common.analytics
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

kgd:
  common:
    redis:
      enabled: true
    analytics:
      enabled: false  # analytics 서비스 자체는 발행자가 아님

analytics:
  score:
    product-cache-ttl: 7200  # 2h in seconds
    keyword-cache-ttl: 7200
    stats-cache-ttl: 3600   # 1h in seconds
  # ADR-0050 Phase 2 — CTR/CVR Bayesian smoothing (default off)
  smoothing:
    enabled: false
    alpha: 1.0
    beta: 9.0
  # ADR-0050 Phase 2 — GMV 7d/30d 누적 (default off; 활성화 전 V002 마이그레이션 필수)
  gmv-aggregation:
    enabled: false
    short-window: P7D
    long-window: P30D

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
