server:
  port: 8090

spring:
  application:
    name: analytics-service

  datasource:
    clickhouse:
      url: jdbc:clickhouse://localhost:8123/analytics
      username: analytics
      password: analytics
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

  data:
    redis:
      cluster:
        nodes: localhost:6379,localhost:6380,localhost:6381,localhost:6382,localhost:6383,localhost:6384
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analytics-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.kgd.common.analytics
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

kgd:
  common:
    redis:
      enabled: true
    analytics:
      enabled: false  # analytics 서비스 자체는 발행자가 아님

analytics:
  score:
    product-cache-ttl: 7200  # 2h in seconds
    keyword-cache-ttl: 7200
    stats-cache-ttl: 3600   # 1h in seconds
