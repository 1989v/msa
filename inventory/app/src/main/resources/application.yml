spring:
  application:
    name: inventory-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3328/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:inventory_user}
      password: ${MYSQL_PASSWORD:inventory_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2
    replica:
      jdbc-url: jdbc:mysql://localhost:3329/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:inventory_user}
      password: ${MYSQL_PASSWORD:inventory_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2
    # ADR-0058: commerce 폴드 — warehouse 도메인 전용 datasource(스키마 격리). env 는 inventory 와 분리.
    warehouse:
      master:
        jdbc-url: jdbc:mysql://${WAREHOUSE_DB_MASTER:localhost:3332}/warehouse_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${WAREHOUSE_MYSQL_USER:warehouse_user}
        password: ${WAREHOUSE_MYSQL_PASSWORD:warehouse_password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 3
          minimum-idle: 1
      replica:
        jdbc-url: jdbc:mysql://${WAREHOUSE_DB_REPLICA:localhost:3333}/warehouse_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${WAREHOUSE_MYSQL_USER:warehouse_user}
        password: ${WAREHOUSE_MYSQL_PASSWORD:warehouse_password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 3
          minimum-idle: 1
    # ADR-0058: commerce 폴드 — fulfillment 도메인 전용 datasource(스키마 격리, 전용 outbox/idempotency).
    fulfillment:
      master:
        jdbc-url: jdbc:mysql://${FULFILLMENT_DB_MASTER:localhost:3330}/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${FULFILLMENT_MYSQL_USER:fulfillment_user}
        password: ${FULFILLMENT_MYSQL_PASSWORD:fulfillment_password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 3
          minimum-idle: 1
      replica:
        jdbc-url: jdbc:mysql://${FULFILLMENT_DB_REPLICA:localhost:3331}/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${FULFILLMENT_MYSQL_USER:fulfillment_user}
        password: ${FULFILLMENT_MYSQL_PASSWORD:fulfillment_password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 3
          minimum-idle: 1
    # ADR-0058: commerce 폴드 — order 도메인 전용 datasource(스키마 격리, 전용 outbox/idempotency).
    order:
      master:
        jdbc-url: jdbc:mysql://${ORDER_DB_MASTER:localhost:3326}/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${ORDER_MYSQL_USER:order_user}
        password: ${ORDER_MYSQL_PASSWORD:order_password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 3
          minimum-idle: 1
      replica:
        jdbc-url: jdbc:mysql://${ORDER_DB_REPLICA:localhost:3327}/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${ORDER_MYSQL_USER:order_user}
        password: ${ORDER_MYSQL_PASSWORD:order_password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 3
          minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  # ADR-0029 PR-3a: Flyway baseline. Hibernate ddl-auto=validate 와 결합해 스키마 변경은 Flyway 단독 책임.
  # baseline-on-migrate=true + baseline-version=1 로 기존 운영 DB(이미 ddl-auto 가 만든 테이블 보유) 보호.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8085
  shutdown: graceful

kafka:
  topics:
    stock-reserved: inventory.stock.reserved
    stock-released: inventory.stock.released
    stock-confirmed: inventory.stock.confirmed
    reservation-expired: inventory.reservation.expired
    # ADR-0058: order 도메인 폴드 — order 발행 토픽
    order-completed: order.order.completed
    order-cancelled: order.order.cancelled

# ADR-0058: order 도메인이 호출하는 외부 서비스 URL (commerce 폴드)
product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:9090}

outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}

inventory:
  reservation:
    ttl-minutes: 30
  outbox:
    polling-interval-ms: 1000
    max-retry: 3
  reconciliation:
    interval-ms: 300000
  admission:
    max-concurrent-reservations: ${INVENTORY_MAX_CONCURRENT_RESERVATIONS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
