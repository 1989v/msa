spring:
  application:
    name: inventory-service
  datasource:
    master:
      url: jdbc:mysql://localhost:3328/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:inventory_user}
      password: ${MYSQL_PASSWORD:inventory_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      url: jdbc:mysql://localhost:3329/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:inventory_user}
      password: ${MYSQL_PASSWORD:inventory_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

kafka:
  topics:
    stock-reserved: inventory.stock.reserved
    stock-released: inventory.stock.released
    stock-confirmed: inventory.stock.confirmed
    reservation-expired: inventory.reservation.expired

inventory:
  reservation:
    ttl-minutes: 30
  outbox:
    polling-interval-ms: 1000
    max-retry: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
