# open-questions.yml
# seven-split-crypto-trading spec
# 생성일: 2026-04-24
# 최종 갱신: 2026-04-24 (review-1 후: OQ-011 ~ OQ-020 추가, Phase 1 착수 블로커/Phase 2·3 게이트 명시)
# 출처: ideabank/docs/12-seven-split-crypto.md 섹션 6 [미결] + planning/requirements.md §10.3 + review-1 피드백

questions:
  # ── 전략 규칙 ──────────────────────────────────────────────────────────────

  - id: OQ-001
    category: strategy
    status: open
    priority: high
    title: '"2분의 1 포인트" 용어 정의'
    description: >
      사용자가 언급한 "2/1포인트 매매"의 구체 정의가 공개 자료에 명시돼 있지 않음.
      박성현 책/영상에서 구체 수치(매수 간격 %, 익절 %)가 명시된 경우 공유 필요.
      없다면 PRD에 기술된 -3%/+10% 기본값(원칙 5·6)으로 갈음.
    resolution_path: 사용자 확인 또는 sevensplit.com wikidocs/영상 가이드 참조
    blocker_for: Phase 1 백테스트 파라미터 기본값 확정

  - id: OQ-002
    category: strategy
    status: open
    priority: high
    title: 암호화폐 변동성 기준 기본값 선택
    description: >
      주식 기준 매수 간격 -3%, 익절 +10%를 암호화폐에 그대로 적용할지,
      암호화폐 조정값(-5~-8% / +5~+15%)으로 시작할지 결정 필요.
      백테스트 결과를 보고 최종 확정.
    resolution_path: Phase 1 백테스트 실행 후 수익률/MDD 비교로 결정
    blocker_for: SplitStrategyConfig 기본값 설정

  # ── 거래소 연동 ────────────────────────────────────────────────────────────

  - id: OQ-003
    category: exchange-integration
    status: open
    priority: high
    title: 주문 실패/부분체결/네트워크 장애 시 재시도 및 상태 복구 정책
    description: >
      기본 방침으로 idempotent order ID + exponential backoff 채택 예정이나,
      구체 재시도 횟수·대기 시간·부분체결 처리(나머지 잔량 재주문 vs 취소) 규칙이 미정.
      ADR-0012(멱등성 패턴)·ADR-0015(장애 대비 전략) 참조하여 서비스 ADR로 확정 필요.
    resolution_path: 구현 단계 진입 전 서비스 ADR 작성
    blocker_for: executor 모듈 구현

  - id: OQ-004
    category: exchange-integration
    status: partial
    priority: medium
    title: 빗썸·업비트 공식 Rate Limit 수치 확인
    description: >
      유저 API Key 단위로 호출량 카운터를 두고 한도 근접 시 백오프하는 방침은 결정됐으나,
      빗썸·업비트 각 거래소의 공식 Rate Limit(초당/분당 호출 한도) 수치가 미확인.
      구현 시점에 공식 문서(빗썸 OpenAPI Docs, 업비트 Open API Docs) 확인 필요.
    resolution_path: 구현 착수 시 공식 API 문서 확인 후 상수로 코드에 기록
    blocker_for: RateLimiter 구현

  # ── 법/보안 ───────────────────────────────────────────────────────────────

  - id: OQ-005
    category: legal-security
    status: open
    priority: medium
    title: 국내 개인 자동매매 도구 법적 이슈 검토
    description: >
      국내에서 개인이 자기 자본으로 운용하는 암호화폐 자동매매 도구의 법적 위험 미검토.
      타인에게 전략을 제공/대행하는 형태로 확장할 경우 금융규제(자본시장법, 가상자산업 관련 법규) 검토 별도 필요.
      MVP 단계(본인 1계정)에서는 즉각적인 법적 장벽은 낮으나, 외부 오픈 전 반드시 확인.
    resolution_path: 외부 오픈 판단 전 법률 검토 (변호사 또는 금융감독원 FAQ 참조)
    blocker_for: 외부 사용자 오픈 의사결정

  - id: OQ-006
    category: legal-security
    status: open
    priority: high
    title: 거래소 API Key 저장·접근 통제 및 감사 로그 요건 정의
    description: >
      PRD에서 AES-GCM 봉투 암호화·IP 화이트리스트 채택이 기술됐으나,
      암호화 키 관리 방식(KMS vs 로컬 환경변수), 접근 통제 역할(본인만 조회 가능 여부),
      감사 로그 보관 기간·형식이 미정.
    resolution_path: 보안 설계 문서 작성 (context/security-design.md)
    blocker_for: 거래소 API Key CRUD API 구현

  # ── 인프라/운영 ───────────────────────────────────────────────────────────

  - id: OQ-007
    category: infra
    status: open
    priority: low
    title: 시세 틱 내부 이벤트 버스 구현 방식 선택
    description: >
      PRD에서 "Kafka 또는 in-process" 이벤트 버스로 기술됨.
      MVP 단계에서 단일 인스턴스라면 in-process(Kotlin SharedFlow 등)로 충분할 수 있으나,
      멀티 인스턴스 스케일아웃 또는 analytics 연동을 고려하면 Kafka가 필요.
      Phase 2 이전에 결정 필요.
    resolution_path: Phase 1 완료 후 스케일링 요건 검토하여 결정
    blocker_for: stream 모듈 설계

  - id: OQ-008
    category: infra
    status: closed
    priority: low
    title: ClickHouse 과거 틱 데이터 확보 경로
    description: >
      Phase 1 백테스트는 ClickHouse의 과거 틱 데이터를 재활용하기로 결정됐으나,
      빗썸/업비트 과거 OHLCV/틱 데이터를 ClickHouse에 적재하는 파이프라인이 아직 없음.
      Q-D 확정으로 1차 수집원은 **빗썸 REST 히스토리 API 배치 수집**(BTC/KRW, ETH/KRW, 분봉, 2023-01~현재)로 합의됨.
      남은 과제: 재수집·증분·재처리 전략, 적재 스키마(`seven_split` DB 네임스페이스), 실패 재시도 설계.
    resolution_path: Phase 1 착수 전 수집·적재·재처리 잡 설계 (context/data-ingestion.md)
    blocker_for: Phase 1 백테스트 실행
    closed_at: 2026-04-26
    closed_by: TG-07 구현 + context/data-ingestion.md
    resolution: >
      TG-07 BithumbHistoryIngestService + ClickHouse seven_split 스키마(V001~V004) 구현 완료.
      증분 수집(FileIngestCheckpointStore) + DLQ(IngestDlqRecorder) + 1000 row 배치 insert.
      ReplacingMergeTree로 중복 흡수, PARTITION BY toYYYYMM(ts), ORDER BY (symbol, interval, ts).
      상세 설계는 context/data-ingestion.md 참조. Phase 1 미적용 항목(자동 스케줄·DLQ 자동 재시도·5년 TTL)은 Phase 2.

  # ── 알림 (Q-C 텔레그램 채택에 따른 신규) ───────────────────────────────────

  - id: OQ-009
    category: notification
    status: open
    priority: high
    title: 텔레그램 Bot Token 저장·멀티테넌트 분배 방식
    description: >
      Q-C 결정에 따라 MVP 알림 채널은 텔레그램 봇으로 확정됨.
      테넌트별 botToken/chatId를 어디에 저장할지(API Key와 동일 볼트 vs 별도 테이블),
      1 테넌트 당 여러 chatId(공유 그룹) 허용 여부, 알림 템플릿 다국어 처리,
      Bot API 실패 시 알림 재전송 vs DLQ 적재 정책을 확정해야 함.
      기본 방침: API Key와 동일 AES-GCM 봉투 암호화 볼트 재사용 + tenantId+channel 복합키.
    resolution_path: 보안 설계 문서(OQ-006)와 함께 설계, NotificationChannel 포트 스펙에 고정
    blocker_for: NotificationChannel 구현 + 텔레그램 어댑터

  # ── 대시보드/리더보드 (Q-E 범위 확장에 따른 신규) ──────────────────────────

  - id: OQ-010
    category: dashboard
    status: open
    priority: medium
    title: 리더보드 점수 산식 및 비교 축 정의
    description: >
      Q-E 결정으로 본인 용도 리더보드가 MVP 범위에 포함됨.
      랭킹/비교 기준을 어떤 축으로 결합할지 미정:
        - 단일 축(누적 수익률)
        - 복합 축(수익률·샤프비·MDD·회차 회전율 가중합)
        - 기간 정규화(연환산 수익률) 적용 여부
        - 실매매/페이퍼/백테스트 간 동일 척도 비교 허용 여부
      본인 복기 용도이나, 내부 점수 산식이 흔들리면 리더보드 테이블 재계산이 필요하므로 초기 고정 필요.
    resolution_path: Phase 1 백테스트 결과 데이터로 후보 산식 2~3개 프로토타입 후 고정
    blocker_for: leaderboard 모듈 스키마 확정

  # ── review-1 신규 OQ (Phase 1 착수 / Phase 2·3 게이트) ─────────────────────

  - id: OQ-011
    category: exchange-terms
    status: pending-user
    priority: high
    title: 빗썸·업비트 이용 약관 상 자동매매 허용 여부 및 API Key 용도 제한
    description: >
      거래소별 이용약관/OpenAPI 약관에 자동매매(봇) 허용 여부, API Key의 상업적 사용 금지 조항,
      특정 전략 유형(마켓메이킹/고빈도/재정거래) 제한이 기재돼 있는지 확인 필요.
      본 서비스는 개인 1인 운용이지만 약관 위반은 계정 정지·Key 회수·법적 책임 위험.
    resolution_path: Phase 2 착수 전 사용자 직접 약관 검토 (context/exchange-terms.md 체크리스트 채우기)
    blocker_for: Phase 2 페이퍼 트레이딩 / Phase 3 실매매 (Phase 1 백테스트는 무관)
    note: |
      2026-04-26 자동 fetch 시도 실패 (apidocs.bithumb.com/docs/policy 404,
      docs.upbit.com 본문 미접근). context/exchange-terms.md 에 검토 프레임워크 작성 완료,
      사용자 수동 약관 확인 후 closed 가능.

  - id: OQ-012
    category: risk
    status: open
    priority: high
    title: 유저별 손실 한도(일별/누적, 금액+%) 구체 정의 및 강제 시점
    description: >
      FR-RISK-01에서 "손실 한도"가 언급되나 구체 수치·산정 단위(포지션/일/누적)·초과 시 동작(자동 청산/일시정지)·
      알림·해제 절차가 미정. 실매매 진입 전 도메인 규약 고정 필요.
    resolution_path: Phase 3 착수 전 ADR 작성 (손실 한도 정책)
    blocker_for: Phase 3 실매매 출시

  - id: OQ-013
    category: risk
    status: open
    priority: high
    title: 글로벌 kill-switch API (전 테넌트 일괄 중지) 설계 및 2FA 요구 여부
    description: >
      단일 테넌트 긴급 청산(FR-RISK-02)과 별개로, 운영자 권한으로 전 테넌트/전 전략을
      즉시 중단하는 kill-switch 엔드포인트 설계 필요. 2FA/step-up 인증 + 감사 로그 + 해제 절차 포함.
    resolution_path: Phase 3 착수 전 ADR 작성 (admin kill-switch)
    blocker_for: Phase 3 실매매 출시

  - id: OQ-014
    category: risk
    status: open
    priority: high
    title: 주문 reconcile 절차 — 타임아웃/네트워크 단절 시 미확정 주문 재조회 및 기동 시 전수 reconcile
    description: >
      주문 전송 후 타임아웃/네트워크 단절로 응답 미확정 상황에서 거래소 상태와 로컬 상태를 맞추는 절차.
      (1) 단건 재조회 루프, (2) 서비스 재시작 시 `SUBMITTED` 상태의 모든 주문을 거래소에서 전수 조회하여 reconcile,
      (3) 부분체결·거부·취소 식별 규칙, (4) 중복 주문 방지(clientOrderId 매핑)를 확정해야 실매매 가능.
    resolution_path: Phase 3 착수 전 설계 문서 + 구현
    blocker_for: Phase 3 실매매 출시

  - id: OQ-015
    category: security
    status: open
    priority: high
    title: Gateway 우회 방지 — NetworkPolicy / mTLS / X-Auth-Signature 중 선택
    description: >
      내부 서비스는 Gateway가 주입한 `X-User-Id` / `X-User-Roles` 헤더를 신뢰한다는 전제.
      클러스터 내부에서 Gateway를 우회한 직접 호출 시 신뢰 헤더 위조 가능성이 있음.
      NetworkPolicy로 상류 제한, mTLS 강제, 또는 Gateway 서명 헤더 검증(X-Auth-Signature) 중 선택.
    resolution_path: Phase 3 착수 전 ADR 작성 (Zero-Trust 서비스 간 신뢰)
    blocker_for: Phase 3 실매매 출시

  - id: OQ-016
    category: security
    status: open
    priority: high
    title: 실매매 권한 Role 명명 + step-up auth(2FA) 적용 엔드포인트
    description: >
      실매매 전용 Role(예: `ROLE_SEVEN_SPLIT_LIVE`) 신설 여부, 2FA(step-up) 필요 엔드포인트
      (전략 활성화/파라미터 변경/긴급 청산/kill-switch/Key CRUD 등) 정의 필요.
    resolution_path: Phase 3 착수 전 (인증 ADR과 정합)
    blocker_for: Phase 3 실매매 출시

  - id: OQ-017
    category: security
    status: open
    priority: medium
    title: KEK 회전 정책 — 주기·DEK 재암호화·회전 실패 동작
    description: >
      AES-GCM 봉투 암호화의 KEK(Key Encryption Key) 회전 주기, 회전 절차
      (신규 KEK 생성 → 기존 DEK를 신규 KEK로 재암호화 → 기존 KEK 폐기), 회전 실패 시 롤백·알림 동작.
    resolution_path: Phase 2 착수 전 보안 설계 문서(OQ-006)에 통합
    blocker_for: Phase 2 실시세 키 사용 시작

  - id: OQ-018
    category: security
    status: open
    priority: medium
    title: audit_log 불변성 보장 방식 — DB 권한 REVOKE / prev_hash 체인 / Kafka 미러
    description: >
      감사 로그가 운영자에 의해 수정/삭제되지 않음을 보장해야 함.
      (a) UPDATE/DELETE 권한 REVOKE 된 별도 DB 사용자,
      (b) prev_hash 해시 체인으로 변조 탐지,
      (c) Kafka 별도 토픽 미러링 + 오브젝트 스토리지 append-only,
      중 선택 또는 조합.
    resolution_path: Phase 2 착수 전 보안 설계 문서(OQ-006)에 통합
    blocker_for: Phase 2 감사 로그 강화

  - id: OQ-019
    category: phase-gate
    status: open
    priority: high
    title: 페이퍼 → 실매매 승격 정량 게이트 (최소 체결 수·기간·MDD·오류 건수)
    description: >
      Phase 2 페이퍼 트레이딩에서 Phase 3 실매매로 승격하는 정량 게이트 정의 필요.
      예: 최소 N주 연속 운용, 최소 M건 체결, MDD ≤ X%, 치명 오류 0건, WS 장애 복구 성공률 ≥ Y%.
      ADR-0024 Consequences의 "최소 N주" 모호 항을 대체.
    resolution_path: Phase 3 착수 전 ADR 작성 (승격 게이트)
    blocker_for: Phase 3 실매매 출시

  - id: OQ-020
    category: domain
    status: open
    priority: medium
    title: 부분체결(PARTIALLY_FILLED) 시 상태 처리 — 중간 substate vs filled/target 필드
    description: >
      `Order.status` 에 `PARTIALLY_FILLED`가 포함되나, 슬롯 관점에서 부분체결된 회차를 어떻게 표현할지 미정.
      (a) `RoundSlot.state`에 중간 substate(`PARTIALLY_FILLED`) 도입,
      (b) 현재 상태는 유지하되 `filledQty`/`targetQty` 필드로 표현,
      (c) 잔량은 즉시 재주문/취소 후 단일 체결로 수렴.
      OQ-003 재시도 정책과 맞물려 결정.
