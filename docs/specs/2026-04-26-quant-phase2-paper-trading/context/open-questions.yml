- id: OQ-007
  title: "시세 이벤트 버스 구현체 선택"
  status: DECIDED
  carry_from: "Phase 1 OQ-007"
  decision: "Coroutine SharedFlow primary + Kafka fan-out side-effect collector"
  rationale: |
    - hot path (Strategy Engine, Dashboard, Alert)는 in-process SharedFlow로 지연 최소화
    - 외부 소비자(analytics 등)를 위해 별도 collector가 비동기 Kafka 발행
    - Kafka publisher bean은 optional — Phase 2 미활성, Phase 3+ 활성
  decided_at: "2026-04-26"

- id: OQ-011
  title: "빗썸 거래소 약관 자동매매 허용 여부"
  status: DECIDED
  carry_from: "Phase 1 OQ-011"
  decision: "진행 — 명시적 금지 조항 미발견, Order rate limit 존재로 자동매매 전제 설계 확인"
  rationale: |
    - 빗썸 약관 직접 1회 검토 수행
    - 자동매매 명시적 금지 조항 미발견
    - Order rate limit 별도 존재 = 자동매매 전제 설계로 해석
    - 법무 검토는 실매매(Phase 3) 이전 재수행 권장
  decided_at: "2026-04-26"

