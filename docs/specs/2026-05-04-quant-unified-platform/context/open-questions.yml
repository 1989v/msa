spec: quant-unified-platform
date: 2026-05-04
status: all-closed

questions:
  - id: Q1
    title: 기술 스택 통합 방향 (full merge)
    decision: kotlin-single-with-python-ingest-sidecar
    rationale: |
      메인 서비스는 quant 의 Kotlin/Spring/JPA/HikariCP 스택으로 단일화.
      ML 코어(임베딩, HNSW cosine) 는 Kotlin/JdbcTemplate + DJL/multik 로 포팅.
      OHLCV 데이터 수집은 yfinance / FinanceDataReader 가 Python 한정이므로
      별도 Python ingest 사이드카(배치) 로 격리 — 단방향 ClickHouse insert.
      메인 서비스는 Python 의존성 없음. 운영 단순화 + ML 라이브러리 보존.
    status: closed

  - id: Q2
    title: 시계열 저장소 통합
    decision: phase1-keep-both
    rationale: |
      Phase 1: ClickHouse(시세 candle) + pgvector(임베딩 벡터) 분리 유지.
      ClickHouse 의 vector search 는 미성숙, pgvector + TimescaleDB 단일화는
      대량 시계열 분석 성능 트레이드오프. Phase 2 에서 데이터 볼륨/접근 패턴
      측정 후 통합 ADR 로 재검토.
    status: closed

  - id: Q3
    title: 데이터 소스 (주식 OHLCV)
    decision: python-ingest-sidecar
    rationale: |
      OSS quant 생태계 default 가 yfinance + FinanceDataReader (KR).
      메인 서비스는 Kotlin 이지만 데이터 ingest 만 Python 사이드카로 분리.
      ClickHouse 에 OHLCV insert 만 담당 — 단방향, 메인 서비스는 ClickHouse 만 read.
      Phase 2+ 에서 운영 안정성 필요 시 Polygon / Alpha Vantage 유료로 교체.
    status: closed

  - id: Q4
    title: 환율 데이터 소스
    decision: exchange-krw-pair
    rationale: |
      Phase 1 — 빗썸 USDT/KRW 페어를 환율 proxy 로 사용 (별도 인증/API 키 0,
      이미 quant 의 빗썸 어댑터 있음). 즉시 구현 가능.
      Phase 2+ — 한국은행 ECOS / Open Exchange Rates 인터페이스 추가 ADR.
      코드는 `FxRateProvider` port 로 추상화해 추후 교체 가능하게.
    status: closed

  - id: Q5
    title: 시그널 strategy 도메인 모델
    decision: c-new-hierarchy-bithumb-only-phase1
    rationale: |
      sealed `Strategy` 신규 도입. 기존 `TrancheStrategy` 가 자식이 되고
      `SignalStrategy` / `HybridStrategy` 가 추가된다.
      Phase 1: 빗썸 단일 거래소 + single-source 시그널만
        (거래량 급증, RSI breakout, MA cross, BB squeeze 등).
      Phase 2: 해외 거래소 (Binance) 추가 + cross-exchange 시그널 (김치프리미엄).
    status: closed

  - id: Q6
    title: 차트 분석 ↔ 자동매매 데이터 공유
    decision: not-applicable
    rationale: |
      옵션 C (full merge) 로 단일 서비스 / 단일 데이터 모델이 됨.
      strategy 와 차트 분석이 같은 ClickHouse / pgvector 를 직접 read 하므로
      별도 공유 메커니즘 불필요.
    status: closed

  - id: Q7
    title: 입문자 학습 콘텐츠 저장
    decision: db-cms
    rationale: |
      DB 기반 CMS — `indicator_content` 테이블 + 어드민 CRUD + public read API.
      Phase 1 어드민 최소 기능: ROLE_ADMIN write, slug 기반 read, markdown body.
      미디어(이미지) 업로드는 Phase 2+ — Phase 1 은 외부 URL 인용만 허용.
      static-md 보다 운영 비용은 ↑ 이지만 콘텐츠 갱신/검토 사이클이 git 분리.
    status: closed

  - id: Q8
    title: 통합 메뉴 / 라우팅 구조
    decision: single-prefix-rest
    rationale: |
      ingress prefix /quant/ 단일.
      SPA 내 라우팅:
        /quant/strategies   — 자동매매 전략
        /quant/charts       — 차트 분석
        /quant/learn        — 입문자 지표 학습
      REST API: /api/v1/{strategies,charts,indicators,learn}/**
      gateway 라우팅 일괄 quant-service.
    status: closed
