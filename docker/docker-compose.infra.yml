      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis-5:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-5
    ports:
      - "6383:6383"
    command: >
      redis-server
      --port 6383
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-5-data:/data
    networks:
      commerce-network:
        ipv4_address: 172.20.2.5
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "6383", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis-6:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-6
    ports:
      - "6384:6384"
    command: >
      redis-server
      --port 6384
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-6-data:/data
    networks:
      commerce-network:
        ipv4_address: 172.20.2.6
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "6384", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Redis Cluster 초기화 (한 번만 실행)
  redis-cluster-init:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-cluster-init
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
      redis-6:
        condition: service_healthy
    networks:
      - commerce-network
    command: >
      sh -c "redis-cli -a ${REDIS_PASSWORD} --cluster create
      172.20.2.1:6379 172.20.2.2:6380 172.20.2.3:6381
      172.20.2.4:6382 172.20.2.5:6383 172.20.2.6:6384
      --cluster-replicas 1 --cluster-yes"
    restart: "no"

  # ============================================================
  # Elasticsearch
  # ============================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.17.0}
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - cluster.name=commerce-cluster
      - node.name=commerce-node-1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
      commerce-network:
        ipv4_address: 172.20.3.1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # OpenSearch — Code Dictionary Service
  # ============================================================

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: opensearch
    ports:
      - "9210:9200"
      - "9310:9300"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=code-dictionary-cluster
      - node.name=code-dictionary-node-1
      - bootstrap.memory_lock=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin1234!
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      commerce-network:
        ipv4_address: 172.20.3.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ============================================================
  # Zookeeper
  # ============================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      commerce-network:
        ipv4_address: 172.20.4.1
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # Kafka
  # ============================================================

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.4.2
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # Kafka Connect + Debezium
  # ============================================================

  kafka-connect:
    image: debezium/connect:2.7
    container_name: kafka-connect
    ports:
      - "8084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.4.3
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # ClickHouse — Analytics Service (OLAP)
  # ============================================================

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.3}
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-analytics}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analytics}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      commerce-network:
        ipv4_address: 172.20.5.1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-analytics} --password ${CLICKHOUSE_PASSWORD:-analytics} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
