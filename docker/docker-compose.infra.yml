networks:
  commerce-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-product-master-data:
  mysql-product-replica-data:
  mysql-order-master-data:
  mysql-order-replica-data:
  mysql-gifticon-master-data:
  mysql-gifticon-replica-data:
  mysql-auth-master-data:
  mysql-auth-replica-data:
  mysql-code-dictionary-master-data:
  mysql-code-dictionary-replica-data:
  mysql-inventory-master-data:
  mysql-inventory-replica-data:
  mysql-fulfillment-master-data:
  mysql-fulfillment-replica-data:
  mysql-warehouse-master-data:
  mysql-warehouse-replica-data:
  mysql-experiment-master-data:
  gifticon-images:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  redis-4-data:
  redis-5-data:
  redis-6-data:
  opensearch-data:
  elasticsearch-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  clickhouse-data:

services:

  # ============================================================
  # MySQL — Product Service
  # ============================================================

  mysql-product-master:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: mysql-product-master
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: product_db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-product-master-data:/var/lib/mysql
      - ./mysql/product-master/my.cnf:/etc/mysql/conf.d/commerce.cnf:ro
      - ./mysql/product-master/init:/docker-entrypoint-initdb.d:ro
    networks:
      commerce-network:
        ipv4_address: 172.20.1.10
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mysql-product-replica:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: mysql-product-replica
    ports:
      - "3317:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: product_db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-product-replica-data:/var/lib/mysql
      - ./mysql/product-replica/my.cnf:/etc/mysql/conf.d/commerce.cnf:ro
    depends_on:
      mysql-product-master:
        condition: service_healthy
    networks:
      commerce-network:
