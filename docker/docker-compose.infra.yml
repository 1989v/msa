    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # Redis Cluster (3 Masters + 3 Replicas)
  # ============================================================

  redis-1:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-1
    ports:
      - "6379:6379"
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-1-data:/data
    networks:
      commerce-network:
        ipv4_address: 172.20.2.1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis-2:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-2
    ports:
      - "6380:6380"
    command: >
      redis-server
      --port 6380
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-2-data:/data
    networks:
      commerce-network:
        ipv4_address: 172.20.2.2
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis-3:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-3
    ports:
      - "6381:6381"
    command: >
      redis-server
      --port 6381
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-3-data:/data
    networks:
      commerce-network:
        ipv4_address: 172.20.2.3
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "6381", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis-4:
    image: redis:${REDIS_VERSION:-7.2}
    container_name: redis-4
    ports:
      - "6382:6382"
    command: >
      redis-server
      --port 6382
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --bind 0.0.0.0
