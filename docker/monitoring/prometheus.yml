global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'product:8081'
          - 'order:8082'
          - 'search:8083'
          - 'auth:8087'
          - 'gateway:8080'
          - 'code-dictionary:8080'
          - 'member:8093'
          - 'gifticon:8086'
          - 'wishlist:8095'
          - 'inventory:8085'
          - 'fulfillment:8088'
          - 'warehouse:8090'
          - 'analytics:8090'
          - 'experiment:8091'
          - 'discovery:8080'
