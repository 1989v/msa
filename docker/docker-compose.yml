include:
  - path: docker-compose.infra.yml

services:

  discovery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: discovery
        MODULE_PATH: discovery
    image: commerce/discovery:latest
    container_name: discovery
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    networks:
      commerce-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: gateway
        MODULE_PATH: gateway
    image: commerce/gateway:latest
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  product:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: product:app
        MODULE_PATH: product/app
    image: commerce/product:latest
    container_name: product
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-product-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  order:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: order:app
        MODULE_PATH: order/app
    image: commerce/order:latest
    container_name: order
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-order-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.40
    restart: unless-stopped

  search:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: search:app
        MODULE_PATH: search/app
    image: commerce/search:latest
    container_name: search
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.50
    restart: unless-stopped

  search-consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: search:consumer
        MODULE_PATH: search/consumer
    image: commerce/search-consumer:latest
    container_name: search-consumer
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    depends_on:
      discovery:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.51
    restart: unless-stopped

  ocr:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    image: commerce/ocr:latest
    container_name: ocr
    ports:
      - "8088:8088"
    networks:
      commerce-network:
        ipv4_address: 172.20.0.80
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: auth:app
        MODULE_PATH: auth/app
    image: commerce/auth:latest
    container_name: auth
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-auth-master:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.70
    restart: unless-stopped

  gifticon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: gifticon:app
        MODULE_PATH: gifticon/app
    image: commerce/gifticon:latest
    container_name: gifticon
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OCR_SERVICE_URL: http://ocr:8088
      GIFTICON_STORAGE_PATH: /app/storage/gifticon-images
    volumes:
      - gifticon-images:/app/storage/gifticon-images
    depends_on:
      discovery:
        condition: service_healthy
      mysql-gifticon-master:
        condition: service_healthy
      ocr:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.60
    restart: unless-stopped

  search-batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: search:batch
        MODULE_PATH: search/batch
    image: commerce/search-batch:latest
    container_name: search-batch
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      PRODUCT_SERVICE_URL: http://product:8081
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      REINDEX_SOURCE: ${REINDEX_SOURCE:-api}
      PRODUCT_DB_HOST: mysql-product-replica
      PRODUCT_DB_PORT: 3306
      PRODUCT_DB_USER: ${MYSQL_USER}
      PRODUCT_DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      product:
        condition: service_healthy
      mysql-product-replica:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.52
    restart: unless-stopped
