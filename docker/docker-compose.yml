include:
  - path: docker-compose.infra.yml

services:

  discovery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: discovery
        MODULE_PATH: discovery
    image: commerce/discovery:latest
    container_name: discovery
    ports:
      - "8761:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    networks:
      commerce-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: gateway
        MODULE_PATH: gateway
    image: commerce/gateway:latest
    container_name: gateway
    ports:
      - "18080:8080"  # TODO: 원래 8080:8080, 로컬 포트 충돌로 임시 변경
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  product:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: product:app
        MODULE_PATH: product/app
    image: commerce/product:latest
    container_name: product
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-product-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  order:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: order:app
        MODULE_PATH: order/app
    image: commerce/order:latest
    container_name: order
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PRODUCT_SERVICE_URL: http://product:8081
    depends_on:
      discovery:
        condition: service_healthy
      mysql-order-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.40
    restart: unless-stopped

  search:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: search:app
        MODULE_PATH: search/app
    image: commerce/search:latest
    container_name: search
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.50
    restart: unless-stopped

  search-consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: search:consumer
        MODULE_PATH: search/consumer
    image: commerce/search-consumer:latest
    container_name: search-consumer
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    depends_on:
      discovery:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.51
    restart: unless-stopped

  auth:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: auth:app
        MODULE_PATH: auth/app
    image: commerce/auth:latest
    container_name: auth
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-auth-master:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.70
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  gifticon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: gifticon:app
        MODULE_PATH: gifticon/app
    image: commerce/gifticon:latest
    container_name: gifticon
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GIFTICON_STORAGE_PATH: /app/storage/gifticon-images
    volumes:
      - gifticon-images:/app/storage/gifticon-images
    depends_on:
      discovery:
        condition: service_healthy
      mysql-gifticon-master:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.60
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  code-dictionary:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: code-dictionary:app
        MODULE_PATH: code-dictionary/app
    image: commerce/code-dictionary:latest
    container_name: code-dictionary
    ports:
      - "8089:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
    depends_on:
      discovery:
        condition: service_healthy
      mysql-code-dictionary-master:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.90
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  inventory:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: inventory:app
        MODULE_PATH: inventory/app
    image: commerce/inventory:latest
    container_name: inventory
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OUTBOX_POLLING_ENABLED: "false"
    depends_on:
      discovery:
        condition: service_healthy
      mysql-inventory-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  fulfillment:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: fulfillment:app
        MODULE_PATH: fulfillment/app
    image: commerce/fulfillment:latest
    container_name: fulfillment
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OUTBOX_POLLING_ENABLED: "false"
    depends_on:
      discovery:
        condition: service_healthy
      mysql-fulfillment-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.81
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  warehouse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: warehouse:app
        MODULE_PATH: warehouse/app
    image: commerce/warehouse:latest
    container_name: warehouse
    ports:
      - "8094:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-warehouse-master:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.82
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  analytics:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: analytics:app
        MODULE_PATH: analytics/app
    image: commerce/analytics:latest
    container_name: analytics
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      # ClickHouse
      SPRING_DATASOURCE_CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/analytics
      SPRING_DATASOURCE_CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:-analytics}
      SPRING_DATASOURCE_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analytics}
      # Redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Eureka
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery:8761/eureka
    depends_on:
      discovery:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.83
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  experiment:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: experiment:app
        MODULE_PATH: experiment/app
    image: commerce/experiment:latest
    container_name: experiment
    ports:
      - "8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-experiment-master:3306/experiment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # Redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Eureka
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery:8761/eureka
      # Analytics API
      ANALYTICS_SERVICE_URL: http://analytics:8090
    depends_on:
      discovery:
        condition: service_healthy
      mysql-experiment-master:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.84
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  search-batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: search:batch
        MODULE_PATH: search/batch
    image: commerce/search-batch:latest
    container_name: search-batch
    ports:
      - "8092:8092"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      PRODUCT_SERVICE_URL: http://product:8081
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      REINDEX_SOURCE: ${REINDEX_SOURCE:-api}
      PRODUCT_DB_HOST: mysql-product-replica
      PRODUCT_DB_PORT: 3306
      PRODUCT_DB_USER: ${MYSQL_USER}
      PRODUCT_DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      product:
        condition: service_healthy
      mysql-product-replica:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.52
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8092/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  member:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: member:app
        MODULE_PATH: member/app
    image: commerce/member:latest
    container_name: member
    ports:
      - "8093:8093"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-member-master:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.100
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8093/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  wishlist:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE_GRADLE: wishlist:app
        MODULE_PATH: wishlist/app
    image: commerce/wishlist:latest
    container_name: wishlist
    ports:
      - "8095:8095"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      discovery:
        condition: service_healthy
      mysql-wishlist-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      commerce-network:
        ipv4_address: 172.20.0.110
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8095/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
