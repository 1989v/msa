server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — root 기준 모든 path 가 index.html 로 리다이렉트.
    # /api/* / /sse/* / /ws/* 같은 백엔드 path 는 ingress 가 gateway 로 먼저 라우팅하므로
    # 본 nginx 까지 도달하지 않는다. 따라서 nginx 내 proxy 설정은 불필요.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
