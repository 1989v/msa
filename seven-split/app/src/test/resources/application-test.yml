spring:
  datasource:
    url: jdbc:h2:mem:sevensplit;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  # TG-08: 단위/슬라이스 테스트 프로파일에서는 Flyway 를 끈다 (H2 + ddl-auto=create-drop 사용).
  # MySQL 통합 테스트는 PersistenceIntegrationSpec 이 Testcontainers 로 별도 DataSource 를 주입.
  flyway:
    enabled: false

kgd:
  common:
    redis:
      enabled: false
    analytics:
      enabled: false
