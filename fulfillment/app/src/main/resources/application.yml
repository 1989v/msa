spring:
  application:
    name: fulfillment-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3330/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:fulfillment_user}
      password: ${MYSQL_PASSWORD:fulfillment_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      jdbc-url: jdbc:mysql://localhost:3331/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:fulfillment_user}
      password: ${MYSQL_PASSWORD:fulfillment_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8088
  shutdown: graceful

kafka:
  topics:
    fulfillment-created: fulfillment.order.created
    fulfillment-shipped: fulfillment.order.shipped
    fulfillment-delivered: fulfillment.order.delivered
    fulfillment-cancelled: fulfillment.order.cancelled

outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}

fulfillment:
  outbox:
    polling-interval-ms: 1000
    max-retry: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
