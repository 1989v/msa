spring:
  application:
    name: fulfillment-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3330/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:fulfillment_user}
      password: ${MYSQL_PASSWORD:fulfillment_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      jdbc-url: jdbc:mysql://localhost:3331/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:fulfillment_user}
      password: ${MYSQL_PASSWORD:fulfillment_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  # ADR-0029 PR-3a: Flyway baseline. Hibernate ddl-auto=validate 와 결합해 스키마 변경은 Flyway 단독 책임.
  # baseline-on-migrate=true + baseline-version=1 로 기존 운영 DB(이미 ddl-auto 가 만든 테이블 보유) 보호.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8088
  shutdown: graceful

kafka:
  topics:
    fulfillment-created: fulfillment.order.created
    fulfillment-shipped: fulfillment.order.shipped
    fulfillment-delivered: fulfillment.order.delivered
    fulfillment-cancelled: fulfillment.order.cancelled

outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}
    # ADR-0032 Phase 0 — common 의 OutboxPollingPublisher 가 본 키를 사용 (default 1000ms)
    interval-ms: 1000

fulfillment:
  outbox:
    max-retry: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
