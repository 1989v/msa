spring:
  application:
    name: fulfillment-service
  datasource:
    master:
      url: jdbc:mysql://localhost:3330/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:fulfillment_user}
      password: ${MYSQL_PASSWORD:fulfillment_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      url: jdbc:mysql://localhost:3331/fulfillment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:fulfillment_user}
      password: ${MYSQL_PASSWORD:fulfillment_password}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

kafka:
  topics:
    fulfillment-created: fulfillment.order.created
    fulfillment-shipped: fulfillment.order.shipped
    fulfillment-delivered: fulfillment.order.delivered
    fulfillment-cancelled: fulfillment.order.cancelled

outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}

fulfillment:
  outbox:
    polling-interval-ms: 1000
    max-retry: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
